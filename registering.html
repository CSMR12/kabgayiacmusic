<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kabgayi · REAL PesaPal Payment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #b8e1ff;
            color: #1e1e1e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 14px;
        }
        .white-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .white-blur::before { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.7) 0%, transparent 70%); filter: blur(30px); }
        .corner-blur { position: fixed; bottom: 0; right: 0; width: 30%; height: 30%; background: radial-gradient(circle at bottom right, rgba(255,255,255,0.8) 0%, transparent 70%); filter: blur(50px); pointer-events: none; z-index: 1; }
        .register-container { position: relative; z-index: 10; width: 100%; max-width: 600px; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .form-card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(12px); border-radius: 32px; padding: 1.5rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .form-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .logo-img { height: 40px; width: auto; cursor: pointer; }
        .cancel-btn { background: transparent; border: none; font-size: 1.5rem; color: #1e3a4a; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .progress-container { margin-bottom: 1.5rem; }
        .step-indicators { display: flex; align-items: center; justify-content: space-between; position: relative; margin-bottom: 0.5rem; }
        .step-indicators::before { content: ''; position: absolute; top: 20px; left: 0; right: 0; height: 3px; background: rgba(44,125,160,0.2); z-index: 0; }
        .step-item { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; }
        .step-circle { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.8); border: 2px solid #d0dde8; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.4rem; }
        .step-item.active .step-circle { border-color: #2c7da0; background: #2c7da0; color: white; }
        .step-item.completed .step-circle { border-color: #2c7da0; background: #2c7da0; color: white; }
        .step-label { font-size: 0.9rem; text-align: center; color: #2c3e50; max-width: 70px; font-weight: 500; }
        .question-title { font-size: 1.3rem; font-weight: 500; margin-bottom: 1.2rem; color: #1e1e1e; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.9rem; font-weight: 500; color: #1e3a4a; margin-bottom: 0.2rem; }
        .form-control { width: 100%; padding: 0.8rem 1rem; font-family: 'Poppins', sans-serif; font-size: 1rem; border: 1px solid rgba(255,255,255,0.5); border-radius: 16px; background: rgba(255,255,255,0.6); }
        .form-control.error { border-color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .error-message { font-size: 0.9rem; color: #e74c3c; margin-top: 0.2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .instruction-text { background: rgba(255,255,255,0.5); padding: 0.8rem; border-radius: 16px; margin-bottom: 1rem; border-left: 4px solid #2c7da0; }
        .file-input { border: 2px dashed rgba(44,125,160,0.3); padding: 1.5rem; text-align: center; border-radius: 20px; background: rgba(255,255,255,0.4); cursor: pointer; }
        .file-input i { font-size: 2rem; color: #2c7da0; margin-bottom: 0.5rem; }
        .preview-image { max-width: 100%; max-height: 150px; border-radius: 12px; margin-top: 0.5rem; }
        .payment-box { background: rgba(255,255,255,0.6); border-radius: 20px; padding: 1.5rem; text-align: center; }
        .amount { font-size: 2rem; font-weight: 700; color: #1e5f7a; margin: 1rem 0; }
        .payment-methods { display: flex; gap: 1rem; margin: 1.5rem 0; justify-content: center; }
        .payment-method-btn { flex: 1; padding: 0.8rem; border: 2px solid rgba(44,125,160,0.3); border-radius: 12px; background: white; cursor: pointer; text-align: center; }
        .payment-method-btn.selected { border-color: #2c7da0; background: rgba(44,125,160,0.1); }
        .payment-method-btn i { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; }
        .payment-status { margin-top: 1rem; padding: 0.8rem; border-radius: 12px; font-weight: 500; display: none; }
        .payment-status.success { display: block; background: rgba(46, 204, 113, 0.2); color: #27ae60; border: 1px solid #27ae60; }
        .payment-status.error { display: block; background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .payment-status.processing { display: block; background: rgba(241, 196, 15, 0.2); color: #f39c12; border: 1px solid #f39c12; }
        .button-group { display: flex; justify-content: space-between; margin-top: 1.5rem; }
        .btn { padding: 0.7rem 2rem; border-radius: 30px; font-size: 0.9rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.6rem; cursor: pointer; border: none; font-family: 'Poppins', sans-serif; background: rgba(255,255,255,0.7); }
        .btn-primary { background: #1e1e1e; color: white; }
        .btn-primary i { color: #ffd966; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .step-transition { animation: fadeSlide 0.4s ease forwards; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ffffff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { position: absolute; bottom: 1rem; left: 0; width: 100%; text-align: center; font-size: 0.9rem; color: #2c3e50; z-index: 20; }
        @media (max-width: 600px) { .form-card { padding: 1rem; } .form-row { grid-template-columns: 1fr; } .payment-methods { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="white-blur"></div>
    <div class="corner-blur"></div>

    <div class="register-container">
        <div class="form-card">
            <div class="form-header">
                <a href="index2.html" class="logo-link">
                    <img src="image/logo.png" alt="Kabgayi Logo" class="logo-img" onerror="this.style.display='none'">
                </a>
                <button class="cancel-btn" id="cancelBtn" title="Cancel registration">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="progress-container">
                <div class="step-indicators" id="stepIndicators"></div>
            </div>

            <div id="formArea" class="step-transition"></div>

            <div class="button-group">
                <button class="btn btn-secondary" id="backBtn" style="visibility: hidden;">← Back</button>
                <button class="btn btn-primary" id="nextBtn">Next →</button>
            </div>
        </div>
    </div>

    <div class="footer"> Diocese Kabgayi · Children's Music School · Registration Fee: 30,000 RWF </div>

    <script>
        (function() {
            // Supabase config
            const supabaseUrl = 'https://amnkoumnvwyjzqcwxord.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtbmtvdW1udnd5anpxY3d4b3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNTI4ODUsImV4cCI6MjA4NzgyODg4NX0.oyY0OobB7ksAz-ectgkKgJC68DacWfK9w1CftJrEUps';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey, { auth: { persistSession: false } });
            
            const IMGBB_API_KEY = '99c6aa298645e8a4742979117fc73be6';
            const REGISTRATION_FEE = 30000;
            
            // REPLACE WITH YOUR REGENERATED CREDENTIALS!
            const PESAPAL_CONSUMER_KEY = 'YOUR_NEW_CONSUMER_KEY';
            const PESAPAL_CONSUMER_SECRET = 'YOUR_NEW_CONSUMER_SECRET';
            
            let selectedPaymentMethod = 'MTN_MOBILE_MONEY';
            let paymentCompleted = false;
            let paymentReference = null;
            let tempRegistrationId = null;
            
            const steps = [
                { type: 'name', title: 'What is your name?', short: 'Name' },
                { type: 'contact', title: 'Your contact number?', short: 'Contact' },
                { type: 'email', title: 'Your email address?', short: 'Email' },
                { type: 'address', title: 'Your address?', short: 'Address' },
                { type: 'report', title: 'Upload a report image', short: 'Report' },
                { type: 'payment', title: 'Pay Registration Fee (30,000 RWF)', short: 'Payment' }
            ];
            
            let currentStep = 0;
            const formData = {
                firstName: '', lastName: '', contact: '', email: '',
                province: '', district: '', sector: '', parish: '',
                reportImage: null, paymentStatus: 'pending', paymentReference: null
            };
            
            const formArea = document.getElementById('formArea');
            const stepIndicators = document.getElementById('stepIndicators');
            const backBtn = document.getElementById('backBtn');
            const nextBtn = document.getElementById('nextBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            
            cancelBtn.addEventListener('click', () => { if(confirm('Cancel registration?')) window.location.href = 'index2.html'; });
            
            function buildProgressBar() {
                let html = '';
                steps.forEach((step, index) => {
                    const isActive = index === currentStep;
                    const isCompleted = index < currentStep;
                    html += `<div class="step-item ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" data-step="${index}">
                        <div class="step-circle">${index + 1}</div>
                        <div class="step-label">${step.short}</div>
                    </div>`;
                });
                stepIndicators.innerHTML = html;
                document.querySelectorAll('.step-item').forEach(item => {
                    item.addEventListener('click', () => { const stepIndex = parseInt(item.dataset.step); if(stepIndex <= currentStep) navigateToStep(stepIndex); });
                });
            }
            
            function navigateToStep(index) {
                if (index < 0 || index >= steps.length || index === currentStep) return;
                if (index > currentStep && !validateCurrentStep()) return;
                saveStepData();
                currentStep = index;
                renderStep();
                updateProgressBar();
                updateButtons();
                formArea.classList.add('step-transition');
                setTimeout(() => formArea.classList.remove('step-transition'), 400);
            }
            
            function updateProgressBar() {
                document.querySelectorAll('.step-item').forEach((item, index) => {
                    item.classList.remove('active', 'completed');
                    if (index === currentStep) item.classList.add('active');
                    else if (index < currentStep) item.classList.add('completed');
                });
            }
            
            function clearErrors() { document.querySelectorAll('.error-message').forEach(el => el.remove()); document.querySelectorAll('.error').forEach(el => el.classList.remove('error')); }
            
            function showError(fieldId, message) {
                const field = document.getElementById(fieldId);
                if (field) {
                    field.classList.add('error');
                    let errorDiv = field.parentNode.querySelector('.error-message');
                    if (!errorDiv) { errorDiv = document.createElement('div'); errorDiv.className = 'error-message'; field.parentNode.appendChild(errorDiv); }
                    errorDiv.textContent = message;
                }
            }
            
            function validateCurrentStep() {
                clearErrors();
                const step = steps[currentStep];
                let isValid = true;
                
                switch (step.type) {
                    case 'name':
                        const firstName = document.getElementById('firstName')?.value.trim() || '';
                        const lastName = document.getElementById('lastName')?.value.trim() || '';
                        if (!firstName) { showError('firstName', 'First name is required'); isValid = false; }
                        if (!lastName) { showError('lastName', 'Last name is required'); isValid = false; }
                        break;
                    case 'contact':
                        const contact = document.getElementById('contact')?.value.trim() || '';
                        if (!contact) { showError('contact', 'Contact number is required'); isValid = false; }
                        else if (!/^0[0-9]{9}$/.test(contact)) { showError('contact', 'Enter a valid phone number (e.g., 0788123456)'); isValid = false; }
                        break;
                    case 'email':
                        const email = document.getElementById('email')?.value.trim() || '';
                        if (!email) { showError('email', 'Email is required'); isValid = false; }
                        else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('email', 'Please enter a valid email'); isValid = false; }
                        break;
                    case 'address':
                        const province = document.getElementById('province')?.value || '';
                        const district = document.getElementById('district')?.value.trim() || '';
                        const sector = document.getElementById('sector')?.value.trim() || '';
                        const parish = document.getElementById('parish')?.value.trim() || '';
                        if (!province) { showError('province', 'Please select a province'); isValid = false; }
                        if (!district) { showError('district', 'District is required'); isValid = false; }
                        if (!sector) { showError('sector', 'Sector is required'); isValid = false; }
                        if (!parish) { showError('parish', 'Parish is required'); isValid = false; }
                        break;
                    case 'report':
                        if (!(formData.reportImage instanceof File)) { showError('fileInput', 'Please upload a report image'); isValid = false; }
                        break;
                    case 'payment':
                        if (!paymentCompleted) { showError('payment', 'Please complete the payment to continue'); isValid = false; }
                        break;
                }
                return isValid;
            }
            
            function renderStep() {
                const step = steps[currentStep];
                let html = `<div class="question-title">${step.title}</div>`;
                
                switch (step.type) {
                    case 'name':
                        html += `<div class="form-row">
                            <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-control" id="firstName" value="${formData.firstName}" placeholder="e.g., Marie"></div>
                            <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-control" id="lastName" value="${formData.lastName}" placeholder="e.g., Uwase"></div>
                        </div>`;
                        break;
                    case 'contact':
                        html += `<div class="form-group"><label class="form-label">Parent's Phone Number (for payment)</label><input type="tel" class="form-control" id="contact" value="${formData.contact}" placeholder="0788123456"><small style="color: #666;">Format: 07XXXXXXXX (10 digits)</small></div>`;
                        break;
                    case 'email':
                        html += `<div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" id="email" value="${formData.email}" placeholder="parent@example.com"></div>`;
                        break;
                    case 'address':
                        html += `<div class="form-group"><label class="form-label">Province</label>
                            <select class="form-control" id="province">
                                <option value="" disabled ${!formData.province ? 'selected' : ''}>Select province</option>
                                <option value="SOUTH" ${formData.province === 'SOUTH' ? 'selected' : ''}>SOUTH</option>
                                <option value="EAST" ${formData.province === 'EAST' ? 'selected' : ''}>EAST</option>
                                <option value="WEST" ${formData.province === 'WEST' ? 'selected' : ''}>WEST</option>
                                <option value="NORTH" ${formData.province === 'NORTH' ? 'selected' : ''}>NORTH</option>
                                <option value="KIGALI" ${formData.province === 'KIGALI' ? 'selected' : ''}>KIGALI</option>
                            </select>
                        </div>
                        <div class="form-group"><label class="form-label">District</label><input type="text" class="form-control" id="district" value="${formData.district}" placeholder="Muhanga"></div>
                        <div class="form-group"><label class="form-label">Sector</label><input type="text" class="form-control" id="sector" value="${formData.sector}" placeholder="Nyamabuye"></div>
                        <div class="form-group"><label class="form-label">Parish</label><input type="text" class="form-control" id="parish" value="${formData.parish}" placeholder="Kabgayi Parish"></div>`;
                        break;
                    case 'report':
                        html += `<div class="instruction-text"><p><i class="fas fa-info-circle"></i> Requirements:</p><p>1. The student must have at least 70% marks in the first term.</p><p>2. Upload a clear image of the report card (PNG, JPG only).</p></div>
                            <div class="file-input" id="fileInput"><i class="fas fa-cloud-upload-alt"></i><p>Click to upload report image</p><input type="file" id="imageFile" accept="image/*" style="display: none;"></div>
                            <div id="preview" style="margin-top: 1rem; text-align: center;"></div>`;
                        break;
                    case 'payment':
                        html += `<div class="payment-box">
                            <i class="fas fa-credit-card" style="font-size: 3rem; color: #2c7da0;"></i>
                            <div class="amount">30,000 RWF</div>
                            <p><strong>Registration Fee</strong></p>
                            <div class="payment-methods">
                                <div class="payment-method-btn ${selectedPaymentMethod === 'MTN_MOBILE_MONEY' ? 'selected' : ''}" data-method="MTN_MOBILE_MONEY"><i class="fas fa-mobile-alt"></i><strong>MTN MoMo</strong></div>
                                <div class="payment-method-btn ${selectedPaymentMethod === 'AIRTEL_MONEY' ? 'selected' : ''}" data-method="AIRTEL_MONEY"><i class="fas fa-mobile-alt"></i><strong>AIRTEL Money</strong></div>
                            </div>
                            <div class="form-group"><label class="form-label">Payment Phone Number</label><input type="tel" class="form-control" id="paymentPhone" placeholder="0788123456" value="${formData.contact}"></div>
                            <button class="btn btn-primary" id="payNowBtn" style="width: 100%; justify-content: center;"><i class="fas fa-lock"></i> Pay 30,000 RWF</button>
                            <div id="paymentStatus" class="payment-status"></div>
                            ${paymentCompleted ? '<div class="payment-status success" style="display: block; margin-top: 0.5rem;"><i class="fas fa-check-circle"></i> Payment Completed!</div>' : ''}
                        </div>`;
                        break;
                }
                
                formArea.innerHTML = html;
                
                if (step.type === 'report') {
                    const fileInput = document.getElementById('imageFile');
                    const fileInputDiv = document.getElementById('fileInput');
                    fileInputDiv.addEventListener('click', () => fileInput.click());
                    fileInput.addEventListener('change', handleFileSelect);
                    if (formData.reportImage instanceof File) {
                        const reader = new FileReader();
                        reader.onload = (e) => { document.getElementById('preview').innerHTML = `<img src="${e.target.result}" class="preview-image">`; };
                        reader.readAsDataURL(formData.reportImage);
                    }
                }
                
                if (step.type === 'payment') {
                    document.querySelectorAll('.payment-method-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            selectedPaymentMethod = btn.dataset.method;
                            document.querySelectorAll('.payment-method-btn').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                        });
                    });
                    const payBtn = document.getElementById('payNowBtn');
                    if (payBtn && !paymentCompleted) payBtn.addEventListener('click', initiatePesaPalPayment);
                }
            }
            
            function handleFileSelect(e) {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) { alert('Please upload an image file (PNG, JPG, JPEG)'); return; }
                if (file.size > 5 * 1024 * 1024) { alert('File size must be less than 5MB'); return; }
                formData.reportImage = file;
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('preview').innerHTML = `<img src="${e.target.result}" class="preview-image">`; };
                reader.readAsDataURL(file);
                document.getElementById('fileInput').classList.remove('error');
            }
            
            // REAL PESAPAL PAYMENT INTEGRATION
            async function initiatePesaPalPayment() {
                const phoneNumber = document.getElementById('paymentPhone')?.value.trim();
                if (!phoneNumber) { alert('Please enter your phone number'); return; }
                if (!/^0[0-9]{9}$/.test(phoneNumber)) { alert('Please enter a valid phone number (10 digits starting with 0)'); return; }
                
                const payBtn = document.getElementById('payNowBtn');
                const statusDiv = document.getElementById('paymentStatus');
                
                payBtn.innerHTML = '<span class="loading-spinner"></span> Connecting to PesaPal...';
                payBtn.disabled = true;
                statusDiv.className = 'payment-status processing';
                statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Initializing payment...';
                statusDiv.style.display = 'block';
                
                try {
                    paymentReference = `KAB-${Date.now()}-${Math.random().toString(36).substr(2, 8)}`.toUpperCase();
                    
                    // Step 1: Get PesaPal Access Token
                    const authString = btoa(`${PESAPAL_CONSUMER_KEY}:${PESAPAL_CONSUMER_SECRET}`);
                    const tokenResponse = await fetch('https://pay.pesapal.com/v3/api/Auth/RequestToken', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Basic ${authString}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            consumer_key: PESAPAL_CONSUMER_KEY,
                            consumer_secret: PESAPAL_CONSUMER_SECRET
                        })
                    });
                    
                    if (!tokenResponse.ok) throw new Error('Failed to authenticate with PesaPal');
                    const tokenData = await tokenResponse.json();
                    const accessToken = tokenData.token;
                    
                    statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating payment order...';
                    
                    // Step 2: Create Order
                    const orderData = {
                        id: paymentReference,
                        currency: "RWF",
                        amount: REGISTRATION_FEE,
                        description: "Kabgayi Music School Registration",
                        callback_url: window.location.href,
                        notification_id: "", // Leave empty for now
                        billing_address: {
                            email_address: formData.email,
                            phone_number: phoneNumber,
                            first_name: formData.firstName,
                            last_name: formData.lastName,
                            country_code: "RW"
                        },
                        line_items: [
                            {
                                name: "Music School Registration",
                                quantity: 1,
                                unit_price: REGISTRATION_FEE,
                                total_amount: REGISTRATION_FEE
                            }
                        ]
                    };
                    
                    const orderResponse = await fetch('https://pay.pesapal.com/v3/api/Transactions/SubmitOrderRequest', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(orderData)
                    });
                    
                    if (!orderResponse.ok) throw new Error('Failed to create order');
                    const orderResult = await orderResponse.json();
                    
                    statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Redirecting to PesaPal payment page...';
                    
                    // Save registration data to Supabase
                    const { error: dbError } = await supabase.from('registrations').insert([{
                        first_name: formData.firstName,
                        last_name: formData.lastName,
                        contact: phoneNumber,
                        email: formData.email,
                        province: formData.province,
                        district: formData.district,
                        sector: formData.sector,
                        parish: formData.parish,
                        payment_reference: paymentReference,
                        payment_status: 'pending',
                        payment_amount: REGISTRATION_FEE,
                        payment_method: selectedPaymentMethod,
                        registration_date: new Date().toISOString()
                    }]);
                    
                    if (dbError) console.error('DB save error:', dbError);
                    
                    // Redirect to PesaPal payment page
                    if (orderResult.redirect_url) {
                        window.location.href = orderResult.redirect_url;
                    } else {
                        throw new Error('No redirect URL received');
                    }
                    
                } catch (error) {
                    console.error('PesaPal error:', error);
                    statusDiv.className = 'payment-status error';
                    statusDiv.innerHTML = `<i class="fas fa-times-circle"></i> Payment error: ${error.message}. Please try again.`;
                    payBtn.innerHTML = '<i class="fas fa-lock"></i> Pay 30,000 RWF';
                    payBtn.disabled = false;
                }
            }
            
            // Check for payment callback on page load
            function checkPaymentCallback() {
                const urlParams = new URLSearchParams(window.location.search);
                const orderTrackingId = urlParams.get('OrderTrackingId');
                const orderMerchantReference = urlParams.get('OrderMerchantReference');
                const status = urlParams.get('Status');
                
                if (status === 'COMPLETED' && orderTrackingId) {
                    // Payment completed - update database
                    updatePaymentStatus(orderTrackingId, orderMerchantReference);
                }
            }
            
            async function updatePaymentStatus(orderTrackingId, orderMerchantReference) {
                const statusDiv = document.getElementById('paymentStatus');
                if (statusDiv) {
                    statusDiv.className = 'payment-status processing';
                    statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying payment...';
                    statusDiv.style.display = 'block';
                }
                
                try {
                    // Update registration with payment completion
                    const { error } = await supabase
                        .from('registrations')
                        .update({ 
                            payment_status: 'completed',
                            payment_reference: orderTrackingId,
                            payment_date: new Date().toISOString(),
                            registration_complete: true
                        })
                        .eq('payment_reference', orderMerchantReference);
                    
                    if (!error) {
                        paymentCompleted = true;
                        if (statusDiv) {
                            statusDiv.className = 'payment-status success';
                            statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Payment successful! You can now submit your registration.';
                        }
                        const payBtn = document.getElementById('payNowBtn');
                        if (payBtn) {
                            payBtn.innerHTML = '<i class="fas fa-check"></i> Payment Completed';
                            payBtn.disabled = true;
                        }
                        nextBtn.disabled = false;
                        
                        // Remove callback params from URL
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (error) {
                    console.error('Verification error:', error);
                }
            }
            
            function saveStepData() {
                const step = steps[currentStep];
                switch (step.type) {
                    case 'name':
                        formData.firstName = document.getElementById('firstName')?.value || '';
                        formData.lastName = document.getElementById('lastName')?.value || '';
                        break;
                    case 'contact':
                        formData.contact = document.getElementById('contact')?.value || '';
                        break;
                    case 'email':
                        formData.email = document.getElementById('email')?.value || '';
                        break;
                    case 'address':
                        formData.province = document.getElementById('province')?.value || '';
                        formData.district = document.getElementById('district')?.value || '';
                        formData.sector = document.getElementById('sector')?.value || '';
                        formData.parish = document.getElementById('parish')?.value || '';
                        break;
                }
            }
            
            function updateButtons() {
                backBtn.style.visibility = currentStep === 0 ? 'hidden' : 'visible';
                nextBtn.innerHTML = currentStep === steps.length - 1 ? 'Submit →' : 'Next →';
                if (currentStep === steps.length - 1 && !paymentCompleted) nextBtn.disabled = true;
                else nextBtn.disabled = false;
            }
            
            async function onNext() {
                saveStepData();
                if (!validateCurrentStep()) return;
                if (currentStep < steps.length - 1) navigateToStep(currentStep + 1);
                else await finalSubmit();
            }
            
            function onBack() {
                saveStepData();
                if (currentStep > 0) navigateToStep(currentStep - 1);
            }
            
            async function finalSubmit() {
                if (!paymentCompleted) { alert('Please complete payment first'); return; }
                
                nextBtn.disabled = true;
                nextBtn.innerHTML = '<span class="loading-spinner"></span> Submitting...';
                
                try {
                    // Upload image if not already uploaded
                    let imageUrl = '';
                    if (formData.reportImage instanceof File) {
                        const formDataImg = new FormData();
                        formDataImg.append('image', formData.reportImage);
                        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { 
                            method: 'POST', 
                            body: formDataImg 
                        });
                        const data = await response.json();
                        if (data.success) imageUrl = data.data.url;
                    }
                    
                    // Update registration with image URL
                    if (imageUrl) {
                        await supabase
                            .from('registrations')
                            .update({ report_image_url: imageUrl })
                            .eq('payment_reference', paymentReference);
                    }
                    
                    window.location.href = 'success.html';
                } catch (error) {
                    console.error('Final submission error:', error);
                    alert('Submission failed. Please try again.');
                    nextBtn.disabled = false;
                    nextBtn.innerHTML = 'Submit →';
                }
            }
            
            // Initialize
            buildProgressBar();
            renderStep();
            updateButtons();
            nextBtn.addEventListener('click', onNext);
            backBtn.addEventListener('click', onBack);
            checkPaymentCallback(); // Check if returning from PesaPal
        })();
    </script>
</body>
</html>
