<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kabgayi · Registration</title>
    <!-- Poppins font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #b8e1ff;
            color: #1e1e1e;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 14px; /* base = 14px */
        }

        .white-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .white-blur::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.7) 0%, transparent 70%);
            filter: blur(30px);
        }

        .white-blur::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 30%;
            height: 30%;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.8) 0%, transparent 70%);
            filter: blur(40px);
        }

        .corner-blur {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 30%;
            height: 30%;
            background: radial-gradient(circle at bottom right, rgba(255,255,255,0.8) 0%, transparent 70%);
            filter: blur(50px);
            pointer-events: none;
            z-index: 1;
        }

        .register-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.5rem;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            position: relative;
        }

        /* Header with logo and cancel */
        .form-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .logo-link {
            display: flex;
            align-items: center;
        }

        .logo-img {
            height: 40px;
            width: auto;
            cursor: pointer;
        }

        .cancel-btn {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: #1e3a4a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .cancel-btn:hover {
            background: rgba(0,0,0,0.05);
        }

        .progress-container {
            margin-bottom: 1.5rem;
        }

        .step-indicators {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            margin-bottom: 0.5rem;
        }

        .step-indicators::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(44,125,160,0.2);
            z-index: 0;
        }

        .step-item {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex: 1;
        }

        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            border: 2px solid #d0dde8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: #4a5a68;
            transition: all 0.2s ease;
            margin-bottom: 0.4rem;
        }

        .step-item.active .step-circle {
            border-color: #2c7da0;
            background: #2c7da0;
            color: white;
        }

        .step-item.completed .step-circle {
            border-color: #2c7da0;
            background: #2c7da0;
            color: white;
        }

        .step-label {
            font-size: 0.8rem; /* ~11.2px, but we need min 14px? Actually we want >=14px, so increase */
            font-size: 0.9rem;  /* 14.4px */
            text-align: center;
            color: #2c3e50;
            max-width: 70px;
            line-height: 1.2;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }

        .step-item.active .step-label {
            color: #1e5f7a;
            font-weight: 600;
        }

        .question-title {
            font-size: 1.3rem; /* ~18.2px */
            font-weight: 500;
            margin-bottom: 1.2rem;
            color: #1e1e1e;
            text-shadow: 0 2px 4px rgba(255,255,255,0.3);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem; /* 14.4px */
            font-weight: 500;
            color: #1e3a4a;
            margin-bottom: 0.2rem;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem; /* 14px */
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 16px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            color: #1e1e1e;
        }

        .form-control:focus {
            outline: none;
            border-color: #2c7da0;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }

        .form-control.error {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .error-message {
            font-size: 0.8rem; /* 11.2px but we want min 14? Actually error messages can be smaller, but we'll make 0.9rem */
            font-size: 0.9rem; /* 14.4px */
            color: #e74c3c;
            margin-top: 0.2rem;
            padding-left: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Instruction text in report step */
        .instruction-text {
            background: rgba(255,255,255,0.5);
            padding: 0.8rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #1e3a4a;
            border-left: 4px solid #2c7da0;
        }

        .instruction-text p {
            margin: 0.2rem 0;
        }

        .file-input {
            border: 2px dashed rgba(44,125,160,0.3);
            padding: 1.5rem;
            text-align: center;
            border-radius: 20px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-input:hover {
            background: rgba(255,255,255,0.7);
            border-color: #2c7da0;
        }

        .file-input i {
            font-size: 2rem;
            color: #2c7da0;
            margin-bottom: 0.5rem;
        }

        .file-input p {
            font-size: 0.9rem;
            color: #1e3a4a;
        }

        .file-input.error {
            border-color: #e74c3c;
            background: rgba(231,76,60,0.1);
        }

        .preview-image {
            max-width: 100%;
            max-height: 150px;
            border-radius: 12px;
            margin-top: 0.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.7rem 2rem;
            border-radius: 30px;
            font-size: 0.9rem; /* 14.4px */
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            font-family: 'Poppins', sans-serif;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            color: #1e1e1e;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn-primary {
            background: #1e1e1e;
            color: white;
            border: none;
        }

        .btn-primary i {
            color: #ffd966;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2a2a2a;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255,255,255,0.9);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .step-transition {
            animation: fadeSlide 0.4s ease forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .need-website-btn {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 125, 160, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 1.5rem 0.4rem;
            border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 100;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            line-height: 1.4;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .need-website-btn:hover {
            background: #1e5f7a;
            padding: 1.8rem 0.5rem;
        }

        .popup-box {
            position: fixed;
            left: 70px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 200;
            min-width: 260px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: none;
        }

        .popup-box.show {
            display: block;
        }

        .popup-content {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .popup-question {
            font-size: 1rem; /* 14px */
            font-weight: 500;
            color: #1e1e1e;
        }

        .popup-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
        }

        .popup-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: 'Poppins', sans-serif;
        }

        .popup-btn-yes {
            background: #2c7da0;
            color: white;
        }

        .popup-btn-yes:hover {
            background: #1e5f7a;
        }

        .popup-btn-no {
            background: #f0f0f0;
            color: #1e1e1e;
        }

        .popup-btn-no:hover {
            background: #e0e0e0;
        }

        .popup-message {
            font-size: 0.95rem;
            color: #2c7da0;
            text-align: center;
            padding: 0.5rem;
        }

        .footer {
            position: absolute;
            bottom: 1rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.9rem; /* 14.4px */
            color: #2c3e50;
            z-index: 20;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }

        @media (max-width: 600px) {
            .form-card {
                padding: 1rem;
            }
            .popup-box {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 80px;
                transform: none;
                width: auto;
            }
            .step-label {
                font-size: 0.8rem; /* 11.2px but on mobile it's okay, but we want min 14? */
                font-size: 0.9rem; /* 14.4px */
                max-width: 60px;
            }
            .step-circle {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }
            .form-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- White blur effects -->
    <div class="white-blur"></div>
    <div class="corner-blur"></div>

    <!-- Background music – silent error handling -->
    <audio id="bgMusic" loop preload="auto" onerror="this.style.display='none'">
        <source src="music/back.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Fixed left vertical button -->
    <div class="need-website-btn" id="needWebsiteBtn">
        NEED A<br>WEBSITE?
    </div>

    <!-- Popup box -->
    <div class="popup-box" id="popupBox">
        <div class="popup-content" id="popupContent">
            <div class="popup-question">Do you want a Portfolio, Survey, or Other website?</div>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-yes" id="popupYes">YES</button>
                <button class="popup-btn popup-btn-no" id="popupNo">NO</button>
            </div>
        </div>
    </div>

    <div class="register-container">
        <div class="form-card">
            <!-- Header with logo and cancel -->
            <div class="form-header">
                <a href="index2.html" class="logo-link">
                    <img src="image/logo.png" alt="Kabgayi Logo" class="logo-img" onerror="this.style.display='none'">
                </a>
                <button class="cancel-btn" id="cancelBtn" title="Cancel registration">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <!-- Modern progress bar (clickable) -->
            <div class="progress-container">
                <div class="step-indicators" id="stepIndicators"></div>
            </div>

            <!-- Form area (dynamic) -->
            <div id="formArea" class="step-transition"></div>

            <!-- Navigation buttons -->
            <div class="button-group">
                <button class="btn btn-secondary" id="backBtn" style="visibility: hidden;">← Back</button>
                <button class="btn btn-primary" id="nextBtn">Next →</button>
            </div>
        </div>
    </div>

    <div class="footer">
        Diocese Kabgayi · Children's Music School
    </div>

    <script>
        (function() {
            // ===== SUPABASE INIT =====
            const supabaseUrl = 'https://amnkoumnvwyjzqcwxord.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtbmtvdW1udnd5anpxY3d4b3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNTI4ODUsImV4cCI6MjA4NzgyODg4NX0.oyY0OobB7ksAz-ectgkKgJC68DacWfK9w1CftJrEUps';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey, {
                auth: { persistSession: false }
            });

            // ===== CONVERT API (replace with your actual key) =====
            const CONVERT_API_SECRET = 'YOUR_CONVERTAPI_SECRET'; // <-- Replace with your key

            // ===== BACKGROUND MUSIC – play only if file loads =====
            const audio = document.getElementById('bgMusic');
            let musicPlayed = false;

            function playMusic() {
                if (!musicPlayed && audio.readyState >= 2) {
                    audio.play().catch(() => {});
                    musicPlayed = true;
                }
            }

            document.addEventListener('click', playMusic, { once: true });
            document.addEventListener('touchstart', playMusic, { once: true });

            // ===== MULTI-STEP FORM STATE =====
            // Removed 'study' step, added 'parish' in address
            const steps = [
                { type: 'name', title: 'What is your name?', short: 'Name' },
                { type: 'contact', title: 'Your contact number?', short: 'Contact' },
                { type: 'email', title: 'Your email address?', short: 'Email' },
                { type: 'address', title: 'Your address?', short: 'Address' },
                { type: 'report', title: 'Upload a report image (school document)', short: 'Report' }
            ];

            let currentStep = 0;
            const formData = {
                firstName: '',
                lastName: '',
                contact: '',
                email: '',
                province: '',
                district: '',
                sector: '',
                parish: '',          // new parish field
                reportImage: null
            };

            const IMGBB_API_KEY = '99c6aa298645e8a4742979117fc73be6';

            const formArea = document.getElementById('formArea');
            const stepIndicators = document.getElementById('stepIndicators');
            const backBtn = document.getElementById('backBtn');
            const nextBtn = document.getElementById('nextBtn');
            const cancelBtn = document.getElementById('cancelBtn');

            // Cancel button: redirect to index2.html
            cancelBtn.addEventListener('click', function() {
                window.location.href = 'index2.html';
            });

            // Build progress bar
            function buildProgressBar() {
                let html = '';
                steps.forEach((step, index) => {
                    const isActive = index === currentStep;
                    const isCompleted = index < currentStep;
                    html += `
                        <div class="step-item ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" data-step="${index}">
                            <div class="step-circle">${index + 1}</div>
                            <div class="step-label">${step.short}</div>
                        </div>
                    `;
                });
                stepIndicators.innerHTML = html;

                document.querySelectorAll('.step-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const stepIndex = parseInt(item.dataset.step);
                        navigateToStep(stepIndex);
                    });
                });
            }

            // Navigate to specific step
            function navigateToStep(index) {
                if (index < 0 || index >= steps.length || index === currentStep) return;
                saveStepData();
                currentStep = index;
                renderStep();
                updateProgressBar();
                updateButtons();
                formArea.classList.add('step-transition');
                setTimeout(() => formArea.classList.remove('step-transition'), 400);
            }

            // Update progress bar active/completed classes
            function updateProgressBar() {
                document.querySelectorAll('.step-item').forEach((item, index) => {
                    item.classList.remove('active', 'completed');
                    if (index === currentStep) {
                        item.classList.add('active');
                    } else if (index < currentStep) {
                        item.classList.add('completed');
                    }
                });
            }

            // Clear errors
            function clearErrors() {
                document.querySelectorAll('.error-message').forEach(el => el.remove());
                document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
            }

            // Show error for a field
            function showError(fieldId, message) {
                const field = document.getElementById(fieldId);
                if (field) {
                    field.classList.add('error');
                    let errorDiv = field.parentNode.querySelector('.error-message');
                    if (!errorDiv) {
                        errorDiv = document.createElement('div');
                        errorDiv.className = 'error-message';
                        field.parentNode.appendChild(errorDiv);
                    }
                    errorDiv.textContent = message;
                } else {
                    // For radio groups or file input
                    const container = document.querySelector('.radio-group') || document.getElementById('fileInput');
                    if (container) {
                        container.classList.add('error');
                        let errorDiv = container.parentNode.querySelector('.error-message');
                        if (!errorDiv) {
                            errorDiv = document.createElement('div');
                            errorDiv.className = 'error-message';
                            container.parentNode.appendChild(errorDiv);
                        }
                        errorDiv.textContent = message;
                    }
                }
            }

            // Validate current step
            function validateCurrentStep() {
                clearErrors();
                const step = steps[currentStep];
                let isValid = true;

                switch (step.type) {
                    case 'name':
                        const firstName = document.getElementById('firstName')?.value.trim() || '';
                        const lastName = document.getElementById('lastName')?.value.trim() || '';
                        if (!firstName) {
                            showError('firstName', 'First name is required');
                            isValid = false;
                        }
                        if (!lastName) {
                            showError('lastName', 'Last name is required');
                            isValid = false;
                        }
                        break;
                    case 'contact':
                        const contact = document.getElementById('contact')?.value.trim() || '';
                        if (!contact) {
                            showError('contact', 'Contact number is required');
                            isValid = false;
                        }
                        break;
                    case 'email':
                        const email = document.getElementById('email')?.value.trim() || '';
                        if (!email) {
                            showError('email', 'Email is required');
                            isValid = false;
                        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                            showError('email', 'Please enter a valid email');
                            isValid = false;
                        }
                        break;
                    case 'address':
                        const province = document.getElementById('province')?.value || '';
                        const district = document.getElementById('district')?.value.trim() || '';
                        const sector = document.getElementById('sector')?.value.trim() || '';
                        const parish = document.getElementById('parish')?.value.trim() || '';
                        if (!province) {
                            showError('province', 'Please select a province');
                            isValid = false;
                        }
                        if (!district) {
                            showError('district', 'District is required');
                            isValid = false;
                        }
                        if (!sector) {
                            showError('sector', 'Sector is required');
                            isValid = false;
                        }
                        if (!parish) {
                            showError('parish', 'Parish is required');
                            isValid = false;
                        }
                        break;
                    case 'report':
                        if (!(formData.reportImage instanceof File)) {
                            showError('fileInput', 'Please upload an image (or a document that can be converted to PNG)');
                            isValid = false;
                        }
                        break;
                }
                return isValid;
            }

            // Render current step
            function renderStep() {
                const step = steps[currentStep];
                let html = `<div class="question-title">${step.title}</div>`;

                switch (step.type) {
                    case 'name':
                        html += `
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" value="${formData.firstName}" placeholder="e.g., Marie">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" value="${formData.lastName}" placeholder="e.g., Uwase">
                                </div>
                            </div>
                        `;
                        break;
                    case 'contact':
                        html += `
                            <div class="form-group">
                                <label class="form-label">Add Parent's phone number (Mother/Father)</label>
                                <input type="tel" class="form-control" id="contact" value="${formData.contact}" placeholder="e.g., 0789 209 371">
                            </div>
                        `;
                        break;
                    case 'email':
                        html += `
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" value="${formData.email}" placeholder="e.g., parent@example.com">
                            </div>
                        `;
                        break;
                    case 'address':
                        html += `
                            <div class="form-group">
                                <label class="form-label">Province</label>
                                <select class="form-control" id="province">
                                    <option value="" disabled ${!formData.province ? 'selected' : ''}>Select province</option>
                                    <option value="SOUTH" ${formData.province === 'SOUTH' ? 'selected' : ''}>SOUTH</option>
                                    <option value="EAST" ${formData.province === 'EAST' ? 'selected' : ''}>EAST</option>
                                    <option value="WEST" ${formData.province === 'WEST' ? 'selected' : ''}>WEST</option>
                                    <option value="NORTH" ${formData.province === 'NORTH' ? 'selected' : ''}>NORTH</option>
                                    <option value="KIGALI" ${formData.province === 'KIGALI' ? 'selected' : ''}>KIGALI</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">District</label>
                                <input type="text" class="form-control" id="district" value="${formData.district}" placeholder="e.g., Muhanga">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Sector</label>
                                <input type="text" class="form-control" id="sector" value="${formData.sector}" placeholder="e.g., Nyamabuye">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Parish</label>
                                <input type="text" class="form-control" id="parish" value="${formData.parish}" placeholder="e.g., Kabgayi Parish">
                            </div>
                        `;
                        break;
                    case 'report':
                        html += `
                            <div class="instruction-text">
                                <p><i class="fas fa-info-circle"></i> Requirements:</p>
                                <p>1. The student must have at least 70% marks in the first term.</p>
                                <p>2. Only image files (PNG, JPG, etc.) are accepted. If you upload a different format, we will try to convert it to PNG.</p>
                            </div>
                            <div class="file-input" id="fileInput">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <p>Click to upload a document (image preferred)</p>
                                <input type="file" id="imageFile" accept="*/*" style="display: none;">
                            </div>
                            <div id="preview" style="margin-top: 1rem; text-align: center;"></div>
                            <div id="conversionStatus" style="font-size:0.9rem; color:#2c7da0; margin-top:0.5rem;"></div>
                        `;
                        break;
                }

                formArea.innerHTML = html;

                if (step.type === 'report') {
                    const fileInput = document.getElementById('imageFile');
                    const fileInputDiv = document.getElementById('fileInput');
                    fileInputDiv.addEventListener('click', () => fileInput.click());
                    fileInput.addEventListener('change', handleFileSelect);
                    if (formData.reportImage instanceof File) {
                        // Show preview if already a file
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            document.getElementById('preview').innerHTML = `<img src="${e.target.result}" class="preview-image">`;
                        };
                        reader.readAsDataURL(formData.reportImage);
                    }
                }
            }

            // Handle file select – validate type and attempt conversion if needed
            async function handleFileSelect(e) {
                const file = e.target.files[0];
                if (!file) return;

                const statusDiv = document.getElementById('conversionStatus');
                statusDiv.innerHTML = 'Processing file...';

                // Check if it's an image by MIME type or extension
                const isImage = file.type.startsWith('image/');
                if (isImage) {
                    // It's an image, accept directly
                    formData.reportImage = file;
                    showFilePreview(file);
                    document.getElementById('fileInput').classList.remove('error');
                    const errorDiv = document.getElementById('fileInput').parentNode.querySelector('.error-message');
                    if (errorDiv) errorDiv.remove();
                    statusDiv.innerHTML = 'Image accepted.';
                } else {
                    // Not an image – attempt conversion via ConvertAPI
                    statusDiv.innerHTML = 'Not an image. Attempting conversion to PNG...';
                    try {
                        const convertedFile = await convertToPng(file);
                        if (convertedFile) {
                            formData.reportImage = convertedFile;
                            showFilePreview(convertedFile);
                            document.getElementById('fileInput').classList.remove('error');
                            const errorDiv = document.getElementById('fileInput').parentNode.querySelector('.error-message');
                            if (errorDiv) errorDiv.remove();
                            statusDiv.innerHTML = 'Conversion successful! PNG file ready.';
                        } else {
                            throw new Error('Conversion returned no file');
                        }
                    } catch (convError) {
                        console.error('Conversion failed:', convError);
                        statusDiv.innerHTML = 'Conversion failed. Please upload a valid image (PNG, JPG, etc.).';
                        formData.reportImage = null;
                        document.getElementById('fileInput').classList.add('error');
                        // Show error message
                        let errorDiv = document.getElementById('fileInput').parentNode.querySelector('.error-message');
                        if (!errorDiv) {
                            errorDiv = document.createElement('div');
                            errorDiv.className = 'error-message';
                            document.getElementById('fileInput').parentNode.appendChild(errorDiv);
                        }
                        errorDiv.textContent = 'Unsupported file. Please upload an image.';
                        // Clear preview
                        document.getElementById('preview').innerHTML = '';
                    }
                }
            }

            // Convert any file to PNG using ConvertAPI
            async function convertToPng(file) {
                if (!CONVERT_API_SECRET || CONVERT_API_SECRET === 'YOUR_CONVERTAPI_SECRET') {
                    throw new Error('ConvertAPI key not set. Please obtain a key from convertapi.com');
                }

                // Get file extension
                const ext = file.name.split('.').pop().toLowerCase();
                if (!ext) throw new Error('Could not determine file extension');

                const url = `https://v2.convertapi.com/convert/${ext}/to/png?Secret=${CONVERT_API_SECRET}&StoreFile=true`;

                const formData = new FormData();
                formData.append('File', file);

                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`ConvertAPI error: ${response.status} ${errorText}`);
                }

                const result = await response.json();
                // ConvertAPI returns an object with Files array containing Url
                if (result.Files && result.Files.length > 0 && result.Files[0].Url) {
                    const fileUrl = result.Files[0].Url;
                    // Download the converted file
                    const fileResponse = await fetch(fileUrl);
                    if (!fileResponse.ok) throw new Error('Failed to download converted file');
                    const blob = await fileResponse.blob();
                    // Create a new File object
                    const convertedFileName = file.name.replace(/\.[^/.]+$/, '') + '.png';
                    return new File([blob], convertedFileName, { type: 'image/png' });
                } else {
                    throw new Error('Unexpected ConvertAPI response');
                }
            }

            // Show preview of file (if image)
            function showFilePreview(file) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        document.getElementById('preview').innerHTML = `<img src="${e.target.result}" class="preview-image">`;
                    };
                    reader.readAsDataURL(file);
                } else {
                    // If converted, it should be PNG, but just in case
                    document.getElementById('preview').innerHTML = `<p class="form-label">File ready: ${file.name}</p>`;
                }
            }

            // Save current step data
            function saveStepData() {
                const step = steps[currentStep];
                switch (step.type) {
                    case 'name':
                        formData.firstName = document.getElementById('firstName')?.value || '';
                        formData.lastName = document.getElementById('lastName')?.value || '';
                        break;
                    case 'contact':
                        formData.contact = document.getElementById('contact')?.value || '';
                        break;
                    case 'email':
                        formData.email = document.getElementById('email')?.value || '';
                        break;
                    case 'address':
                        formData.province = document.getElementById('province')?.value || '';
                        formData.district = document.getElementById('district')?.value || '';
                        formData.sector = document.getElementById('sector')?.value || '';
                        formData.parish = document.getElementById('parish')?.value || '';
                        break;
                    case 'report':
                        // already stored
                        break;
                }
            }

            // Validate all steps
            function validateAll() {
                if (!formData.firstName.trim() || !formData.lastName.trim()) return false;
                if (!formData.contact.trim()) return false;
                if (!formData.email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) return false;
                if (!formData.province || !formData.district.trim() || !formData.sector.trim() || !formData.parish.trim()) return false;
                if (!(formData.reportImage instanceof File)) return false;
                return true;
            }

            // Update buttons
            function updateButtons() {
                backBtn.style.visibility = currentStep === 0 ? 'hidden' : 'visible';
                nextBtn.innerHTML = currentStep === steps.length - 1 ? 'Submit →' : 'Next →';
            }

            // Next button handler
            function onNext() {
                saveStepData();
                if (!validateCurrentStep()) return;

                if (currentStep < steps.length - 1) {
                    navigateToStep(currentStep + 1);
                } else {
                    onSubmit();
                }
            }

            // Back button handler
            function onBack() {
                saveStepData();
                if (currentStep > 0) {
                    navigateToStep(currentStep - 1);
                }
            }

            // Submit form to Supabase
            async function onSubmit() {
                saveStepData();
                if (!validateAll()) {
                    alert('Please complete all fields correctly before submitting.');
                    return;
                }

                nextBtn.disabled = true;
                backBtn.disabled = true;

                try {
                    // 1. Upload image to ImgBB
                    let imageUrl = '';
                    if (formData.reportImage instanceof File) {
                        const formDataImg = new FormData();
                        formDataImg.append('image', formData.reportImage);
                        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                            method: 'POST',
                            body: formDataImg
                        });
                        const data = await response.json();
                        if (data.success) {
                            imageUrl = data.data.url;
                        } else {
                            alert('Image upload failed. Please try again.');
                            nextBtn.disabled = false;
                            backBtn.disabled = false;
                            return;
                        }
                    }

                    // 2. Insert data into Supabase (study removed, parish added)
                    const { error } = await supabase
                        .from('registrations')
                        .insert([
                            {
                                first_name: formData.firstName,
                                last_name: formData.lastName,
                                contact: formData.contact,
                                email: formData.email,
                                province: formData.province,
                                district: formData.district,
                                sector: formData.sector,
                                parish: formData.parish,          // new field
                                report_image_url: imageUrl
                            }
                        ]);

                    if (error) {
                        console.error('Supabase error details:', error);
                        let errorMsg = 'Registration failed. ';
                        if (error.message && error.message.includes('Failed to fetch')) {
                            errorMsg += 'Network error – please check your internet connection.';
                        } else if (error.code === '42P01') {
                            errorMsg += 'The "registrations" table does not exist. Please create it in your Supabase dashboard.';
                        } else if (error.code === '42501') {
                            errorMsg += 'Permission denied. You need to add an INSERT policy for the "registrations" table.';
                        } else {
                            errorMsg += error.message;
                        }
                        alert(errorMsg);
                        nextBtn.disabled = false;
                        backBtn.disabled = false;
                        return;
                    }

                    // 3. Success – redirect
                    window.location.href = 'success.html';

                } catch (error) {
                    console.error('Submission error:', error);
                    alert('An unexpected error occurred. Please check the console for details.');
                    nextBtn.disabled = false;
                    backBtn.disabled = false;
                }
            }

            // Initialize
            buildProgressBar();
            renderStep();
            updateButtons();

            nextBtn.addEventListener('click', onNext);
            backBtn.addEventListener('click', onBack);

            // ===== NEED WEBSITE POPUP LOGIC =====
            const needBtn = document.getElementById('needWebsiteBtn');
            const popup = document.getElementById('popupBox');
            const popupContent = document.getElementById('popupContent');

            function closePopup() {
                popup.classList.remove('show');
            }

            function openPopup() {
                popupContent.innerHTML = `
                    <div class="popup-question">Do you want a Portfolio, Survey, or Other website?</div>
                    <div class="popup-buttons">
                        <button class="popup-btn popup-btn-yes" id="popupYes">YES</button>
                        <button class="popup-btn popup-btn-no" id="popupNo">NO</button>
                    </div>
                `;
                document.getElementById('popupYes').addEventListener('click', function(e) {
                    e.stopPropagation();
                    window.open('https://mkbertrand.vercel.app/#contact', '_blank');
                    closePopup();
                });
                document.getElementById('popupNo').addEventListener('click', function(e) {
                    e.stopPropagation();
                    popupContent.innerHTML = `
                        <div class="popup-message">Text 0795 065 789 if you change your mind</div>
                    `;
                    setTimeout(closePopup, 3000);
                });
                popup.classList.add('show');
            }

            needBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (popup.classList.contains('show')) {
                    closePopup();
                } else {
                    openPopup();
                }
            });

            document.addEventListener('click', function(e) {
                if (!popup.contains(e.target) && !needBtn.contains(e.target)) {
                    closePopup();
                }
            });

            popup.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        })();
    </script>
</body>
</html>
