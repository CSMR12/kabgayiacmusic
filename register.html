<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kabgayi · Registration</title>
    <!-- Poppins font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... (keep all existing styles from previous answer) ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #b8e1ff;
            color: #1e1e1e;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .white-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .white-blur::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.7) 0%, transparent 70%);
            filter: blur(30px);
        }

        .white-blur::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 30%;
            height: 30%;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.8) 0%, transparent 70%);
            filter: blur(40px);
        }

        .corner-blur {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 30%;
            height: 30%;
            background: radial-gradient(circle at bottom right, rgba(255,255,255,0.8) 0%, transparent 70%);
            filter: blur(50px);
            pointer-events: none;
            z-index: 1;
        }

        .register-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .progress-container {
            margin-bottom: 2rem;
        }

        .step-indicators {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            margin-bottom: 0.5rem;
        }

        .step-indicators::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(44,125,160,0.2);
            z-index: 0;
        }

        .step-item {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex: 1;
        }

        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            border: 2px solid #d0dde8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: #4a5a68;
            transition: all 0.2s ease;
            margin-bottom: 0.4rem;
        }

        .step-item.active .step-circle {
            border-color: #2c7da0;
            background: #2c7da0;
            color: white;
        }

        .step-item.completed .step-circle {
            border-color: #2c7da0;
            background: #2c7da0;
            color: white;
        }

        .step-label {
            font-size: 0.6rem;
            text-align: center;
            color: #2c3e50;
            max-width: 70px;
            line-height: 1.2;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(255,255,255,0.5);
        }

        .step-item.active .step-label {
            color: #1e5f7a;
            font-weight: 600;
        }

        .question-title {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            color: #1e1e1e;
            text-shadow: 0 2px 4px rgba(255,255,255,0.3);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e3a4a;
            margin-bottom: 0.3rem;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 16px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            color: #1e1e1e;
        }

        .form-control:focus {
            outline: none;
            border-color: #2c7da0;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }

        .form-control.error {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .error-message {
            font-size: 0.7rem;
            color: #e74c3c;
            margin-top: 0.2rem;
            padding-left: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .radio-group {
            display: flex;
            gap: 2rem;
            margin: 1rem 0;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #1e3a4a;
        }

        .radio-option input[type="radio"] {
            accent-color: #2c7da0;
            width: 16px;
            height: 16px;
        }

        .file-input {
            border: 2px dashed rgba(44,125,160,0.3);
            padding: 1.5rem;
            text-align: center;
            border-radius: 20px;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-input:hover {
            background: rgba(255,255,255,0.7);
            border-color: #2c7da0;
        }

        .file-input i {
            font-size: 2rem;
            color: #2c7da0;
            margin-bottom: 0.5rem;
        }

        .file-input p {
            font-size: 0.8rem;
            color: #1e3a4a;
        }

        .file-input.error {
            border-color: #e74c3c;
            background: rgba(231,76,60,0.1);
        }

        .preview-image {
            max-width: 100%;
            max-height: 150px;
            border-radius: 12px;
            margin-top: 0.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.7rem 2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            font-family: 'Poppins', sans-serif;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            color: #1e1e1e;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn-primary {
            background: #1e1e1e;
            color: white;
            border: none;
        }

        .btn-primary i {
            color: #ffd966;
        }

        .btn-primary:hover:not(:disabled) {
            background: #2a2a2a;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255,255,255,0.9);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .step-transition {
            animation: fadeSlide 0.4s ease forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .need-website-btn {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 125, 160, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 1.5rem 0.4rem;
            border-radius: 0 12px 12px 0;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 100;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            line-height: 1.4;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .need-website-btn:hover {
            background: #1e5f7a;
            padding: 1.8rem 0.5rem;
        }

        .popup-box {
            position: fixed;
            left: 70px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 200;
            min-width: 260px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: none;
        }

        .popup-box.show {
            display: block;
        }

        .popup-content {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .popup-question {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e1e1e;
        }

        .popup-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
        }

        .popup-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: 'Poppins', sans-serif;
        }

        .popup-btn-yes {
            background: #2c7da0;
            color: white;
        }

        .popup-btn-yes:hover {
            background: #1e5f7a;
        }

        .popup-btn-no {
            background: #f0f0f0;
            color: #1e1e1e;
        }

        .popup-btn-no:hover {
            background: #e0e0e0;
        }

        .popup-message {
            font-size: 0.9rem;
            color: #2c7da0;
            text-align: center;
            padding: 0.5rem;
        }

        .footer {
            position: absolute;
            bottom: 1rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            color: #2c3e50;
            z-index: 20;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }

        @media (max-width: 600px) {
            .form-card {
                padding: 1.5rem;
            }
            .popup-box {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 80px;
                transform: none;
                width: auto;
            }
            .step-label {
                font-size: 0.5rem;
            }
            .step-circle {
                width: 28px;
                height: 28px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <!-- White blur effects -->
    <div class="white-blur"></div>
    <div class="corner-blur"></div>

    <!-- Background music (hidden, plays on first interaction) -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music/back.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Fixed left vertical button -->
    <div class="need-website-btn" id="needWebsiteBtn">
        NEED A<br>WEBSITE?
    </div>

    <!-- Popup box -->
    <div class="popup-box" id="popupBox">
        <div class="popup-content" id="popupContent">
            <div class="popup-question">Do you want a Portfolio, Survey, or Other website?</div>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-yes" id="popupYes">YES</button>
                <button class="popup-btn popup-btn-no" id="popupNo">NO</button>
            </div>
        </div>
    </div>

    <div class="register-container">
        <div class="form-card">
            <!-- Modern progress bar (clickable) -->
            <div class="progress-container">
                <div class="step-indicators" id="stepIndicators"></div>
            </div>

            <!-- Form area (dynamic) -->
            <div id="formArea" class="step-transition"></div>

            <!-- Navigation buttons -->
            <div class="button-group">
                <button class="btn btn-secondary" id="backBtn" style="visibility: hidden;">← Back</button>
                <button class="btn btn-primary" id="nextBtn">Next →</button>
            </div>
        </div>
    </div>

    <div class="footer">
        Diocese Kabgayi · Académie de Musique Sacrée · Children's Music School
    </div>

    <script>
        (function() {
            // ===== SUPABASE INIT =====
            const supabaseUrl = 'https://amnkoumnuwyjzqcxword.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtbmtvdW1udnd5anpxY3d4b3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNTI4ODUsImV4cCI6MjA4NzgyODg4NX0.oyY0OobB7ksAz-ectgkKgJC68DacWfK9w1CftJrEUps';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

            // ===== BACKGROUND MUSIC =====
            const audio = document.getElementById('bgMusic');
            let musicPlayed = false;

            function playMusic() {
                if (!musicPlayed) {
                    audio.play().catch(e => console.log('Autoplay prevented:', e));
                    musicPlayed = true;
                }
            }

            document.addEventListener('click', playMusic, { once: true });
            document.addEventListener('touchstart', playMusic, { once: true });

            // ===== MULTI-STEP FORM STATE =====
            const steps = [
                { type: 'name', title: 'What is your name?', short: 'Name' },
                { type: 'contact', title: 'Your contact number?', short: 'Contact' },
                { type: 'email', title: 'Your email address?', short: 'Email' },
                { type: 'address', title: 'Your address?', short: 'Address' },
                { type: 'study', title: 'Can you take courses Monday to Friday?', short: 'Study' },
                { type: 'report', title: 'Upload a report image (school document)', short: 'Report' }
            ];

            let currentStep = 0;
            const formData = {
                firstName: '',
                lastName: '',
                contact: '',
                email: '',
                province: '',
                district: '',
                sector: '',
                study: null,
                reportImage: null
            };

            const IMGBB_API_KEY = '99c6aa298645e8a4742979117fc73be6'; // Replace with your actual key

            // DOM elements
            const formArea = document.getElementById('formArea');
            const stepIndicators = document.getElementById('stepIndicators');
            const backBtn = document.getElementById('backBtn');
            const nextBtn = document.getElementById('nextBtn');

            // Build progress bar
            function buildProgressBar() {
                let html = '';
                steps.forEach((step, index) => {
                    const isActive = index === currentStep;
                    const isCompleted = index < currentStep;
                    html += `
                        <div class="step-item ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" data-step="${index}">
                            <div class="step-circle">${index + 1}</div>
                            <div class="step-label">${step.short}</div>
                        </div>
                    `;
                });
                stepIndicators.innerHTML = html;

                document.querySelectorAll('.step-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const stepIndex = parseInt(item.dataset.step);
                        navigateToStep(stepIndex);
                    });
                });
            }

            // Navigate to specific step
            function navigateToStep(index) {
                if (index < 0 || index >= steps.length || index === currentStep) return;
                saveStepData();
                currentStep = index;
                renderStep();
                updateProgressBar();
                updateButtons();
                formArea.classList.add('step-transition');
                setTimeout(() => formArea.classList.remove('step-transition'), 400);
            }

            // Update progress bar active/completed classes
            function updateProgressBar() {
                document.querySelectorAll('.step-item').forEach((item, index) => {
                    item.classList.remove('active', 'completed');
                    if (index === currentStep) {
                        item.classList.add('active');
                    } else if (index < currentStep) {
                        item.classList.add('completed');
                    }
                });
            }

            // Clear errors
            function clearErrors() {
                document.querySelectorAll('.error-message').forEach(el => el.remove());
                document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
            }

            // Show error for a field
            function showError(fieldId, message) {
                const field = document.getElementById(fieldId);
                if (field) {
                    field.classList.add('error');
                    let errorDiv = field.parentNode.querySelector('.error-message');
                    if (!errorDiv) {
                        errorDiv = document.createElement('div');
                        errorDiv.className = 'error-message';
                        field.parentNode.appendChild(errorDiv);
                    }
                    errorDiv.textContent = message;
                }
            }

            // Validate current step
            function validateCurrentStep() {
                clearErrors();
                const step = steps[currentStep];
                let isValid = true;

                switch (step.type) {
                    case 'name':
                        const firstName = document.getElementById('firstName')?.value.trim() || '';
                        const lastName = document.getElementById('lastName')?.value.trim() || '';
                        if (!firstName) {
                            showError('firstName', 'First name is required');
                            isValid = false;
                        }
                        if (!lastName) {
                            showError('lastName', 'Last name is required');
                            isValid = false;
                        }
                        break;
                    case 'contact':
                        const contact = document.getElementById('contact')?.value.trim() || '';
                        if (!contact) {
                            showError('contact', 'Contact number is required');
                            isValid = false;
                        }
                        break;
                    case 'email':
                        const email = document.getElementById('email')?.value.trim() || '';
                        if (!email) {
                            showError('email', 'Email is required');
                            isValid = false;
                        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                            showError('email', 'Please enter a valid email');
                            isValid = false;
                        }
                        break;
                    case 'address':
                        const province = document.getElementById('province')?.value || '';
                        const district = document.getElementById('district')?.value.trim() || '';
                        const sector = document.getElementById('sector')?.value.trim() || '';
                        if (!province) {
                            showError('province', 'Please select a province');
                            isValid = false;
                        }
                        if (!district) {
                            showError('district', 'District is required');
                            isValid = false;
                        }
                        if (!sector) {
                            showError('sector', 'Sector is required');
                            isValid = false;
                        }
                        break;
                    case 'study':
                        const radios = document.getElementsByName('study');
                        let checked = false;
                        for (let radio of radios) {
                            if (radio.checked) checked = true;
                        }
                        if (!checked) {
                            const radioGroup = document.querySelector('.radio-group');
                            let errorDiv = radioGroup.parentNode.querySelector('.error-message');
                            if (!errorDiv) {
                                errorDiv = document.createElement('div');
                                errorDiv.className = 'error-message';
                                radioGroup.parentNode.appendChild(errorDiv);
                            }
                            errorDiv.textContent = 'Please select an option';
                            isValid = false;
                        }
                        break;
                    case 'report':
                        if (!(formData.reportImage instanceof File)) {
                            const fileInputDiv = document.getElementById('fileInput');
                            fileInputDiv.classList.add('error');
                            let errorDiv = fileInputDiv.parentNode.querySelector('.error-message');
                            if (!errorDiv) {
                                errorDiv = document.createElement('div');
                                errorDiv.className = 'error-message';
                                fileInputDiv.parentNode.appendChild(errorDiv);
                            }
                            errorDiv.textContent = 'Please upload an image';
                            isValid = false;
                        }
                        break;
                }
                return isValid;
            }

            // Render current step
            function renderStep() {
                const step = steps[currentStep];
                let html = `<div class="question-title">${step.title}</div>`;

                switch (step.type) {
                    case 'name':
                        html += `
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" value="${formData.firstName}" placeholder="e.g., Marie">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" value="${formData.lastName}" placeholder="e.g., Uwase">
                                </div>
                            </div>
                        `;
                        break;
                    case 'contact':
                        html += `
                            <div class="form-group">
                                <label class="form-label">Phone Number (WhatsApp preferred)</label>
                                <input type="tel" class="form-control" id="contact" value="${formData.contact}" placeholder="e.g., 0789 209 371">
                            </div>
                        `;
                        break;
                    case 'email':
                        html += `
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" value="${formData.email}" placeholder="e.g., parent@example.com">
                            </div>
                        `;
                        break;
                    case 'address':
                        html += `
                            <div class="form-group">
                                <label class="form-label">Province</label>
                                <select class="form-control" id="province">
                                    <option value="" disabled ${!formData.province ? 'selected' : ''}>Select province</option>
                                    <option value="SOUTH" ${formData.province === 'SOUTH' ? 'selected' : ''}>SOUTH</option>
                                    <option value="EAST" ${formData.province === 'EAST' ? 'selected' : ''}>EAST</option>
                                    <option value="WEST" ${formData.province === 'WEST' ? 'selected' : ''}>WEST</option>
                                    <option value="NORTH" ${formData.province === 'NORTH' ? 'selected' : ''}>NORTH</option>
                                    <option value="KIGALI" ${formData.province === 'KIGALI' ? 'selected' : ''}>KIGALI</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">District</label>
                                <input type="text" class="form-control" id="district" value="${formData.district}" placeholder="e.g., Muhanga">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Sector</label>
                                <input type="text" class="form-control" id="sector" value="${formData.sector}" placeholder="e.g., Kabgayi">
                            </div>
                        `;
                        break;
                    case 'study':
                        html += `
                            <div class="radio-group">
                                <label class="radio-option">
                                    <input type="radio" name="study" value="yes" ${formData.study === true ? 'checked' : ''}> Yes
                                </label>
                                <label class="radio-option">
                                    <input type="radio" name="study" value="no" ${formData.study === false ? 'checked' : ''}> No
                                </label>
                            </div>
                        `;
                        break;
                    case 'report':
                        html += `
                            <div class="file-input" id="fileInput">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <p>Click to upload an image (school report)</p>
                                <input type="file" id="imageFile" accept="image/*" style="display: none;">
                            </div>
                            <div id="preview" style="margin-top: 1rem; text-align: center;"></div>
                        `;
                        break;
                }

                formArea.innerHTML = html;

                if (step.type === 'report') {
                    const fileInput = document.getElementById('imageFile');
                    const fileInputDiv = document.getElementById('fileInput');
                    fileInputDiv.addEventListener('click', () => fileInput.click());
                    fileInput.addEventListener('change', handleFileSelect);
                    if (formData.reportImage instanceof File) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            document.getElementById('preview').innerHTML = `<img src="${e.target.result}" class="preview-image">`;
                        };
                        reader.readAsDataURL(formData.reportImage);
                    }
                }
            }

            // Handle file select
            function handleFileSelect(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const preview = document.getElementById('preview');
                        preview.innerHTML = `<img src="${event.target.result}" class="preview-image">`;
                        formData.reportImage = file;
                        document.getElementById('fileInput').classList.remove('error');
                        const errorDiv = document.getElementById('fileInput').parentNode.querySelector('.error-message');
                        if (errorDiv) errorDiv.remove();
                    };
                    reader.readAsDataURL(file);
                }
            }

            // Save current step data
            function saveStepData() {
                const step = steps[currentStep];
                switch (step.type) {
                    case 'name':
                        formData.firstName = document.getElementById('firstName')?.value || '';
                        formData.lastName = document.getElementById('lastName')?.value || '';
                        break;
                    case 'contact':
                        formData.contact = document.getElementById('contact')?.value || '';
                        break;
                    case 'email':
                        formData.email = document.getElementById('email')?.value || '';
                        break;
                    case 'address':
                        formData.province = document.getElementById('province')?.value || '';
                        formData.district = document.getElementById('district')?.value || '';
                        formData.sector = document.getElementById('sector')?.value || '';
                        break;
                    case 'study':
                        const radios = document.getElementsByName('study');
                        for (let radio of radios) {
                            if (radio.checked) {
                                formData.study = radio.value === 'yes';
                                break;
                            }
                        }
                        break;
                    case 'report':
                        // already stored
                        break;
                }
            }

            // Validate all steps
            function validateAll() {
                if (!formData.firstName.trim() || !formData.lastName.trim()) return false;
                if (!formData.contact.trim()) return false;
                if (!formData.email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) return false;
                if (!formData.province || !formData.district.trim() || !formData.sector.trim()) return false;
                if (formData.study === null) return false;
                if (!(formData.reportImage instanceof File)) return false;
                return true;
            }

            // Update buttons
            function updateButtons() {
                backBtn.style.visibility = currentStep === 0 ? 'hidden' : 'visible';
                nextBtn.innerHTML = currentStep === steps.length - 1 ? 'Submit →' : 'Next →';
            }

            // Next button handler
            function onNext() {
                saveStepData();
                if (!validateCurrentStep()) return;

                if (currentStep < steps.length - 1) {
                    navigateToStep(currentStep + 1);
                } else {
                    onSubmit();
                }
            }

            // Back button handler
            function onBack() {
                saveStepData();
                if (currentStep > 0) {
                    navigateToStep(currentStep - 1);
                }
            }

            // Submit form to Supabase
            async function onSubmit() {
                saveStepData();
                if (!validateAll()) {
                    alert('Please complete all fields correctly before submitting.');
                    return;
                }

                nextBtn.disabled = true;
                backBtn.disabled = true;

                try {
                    // 1. Upload image to ImgBB
                    let imageUrl = '';
                    if (formData.reportImage instanceof File) {
                        const formDataImg = new FormData();
                        formDataImg.append('image', formData.reportImage);
                        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                            method: 'POST',
                            body: formDataImg
                        });
                        const data = await response.json();
                        if (data.success) {
                            imageUrl = data.data.url;
                        } else {
                            alert('Image upload failed. Please try again.');
                            nextBtn.disabled = false;
                            backBtn.disabled = false;
                            return;
                        }
                    }

                    // 2. Insert data into Supabase
                    const { error } = await supabase
                        .from('registrations')
                        .insert([
                            {
                                first_name: formData.firstName,
                                last_name: formData.lastName,
                                contact: formData.contact,
                                email: formData.email,
                                province: formData.province,
                                district: formData.district,
                                sector: formData.sector,
                                study: formData.study,
                                report_image_url: imageUrl
                            }
                        ]);

                    if (error) {
                        console.error('Supabase error:', error);
                        alert('Registration failed. Please try again.');
                        nextBtn.disabled = false;
                        backBtn.disabled = false;
                        return;
                    }

                    // 3. Success – redirect
                    window.location.href = 'success.html';

                } catch (error) {
                    console.error('Submission error:', error);
                    alert('An error occurred. Please try again.');
                    nextBtn.disabled = false;
                    backBtn.disabled = false;
                }
            }

            // Initialize
            buildProgressBar();
            renderStep();
            updateButtons();

            nextBtn.addEventListener('click', onNext);
            backBtn.addEventListener('click', onBack);

            // ===== NEED WEBSITE POPUP LOGIC =====
            const needBtn = document.getElementById('needWebsiteBtn');
            const popup = document.getElementById('popupBox');
            const popupContent = document.getElementById('popupContent');

            function closePopup() {
                popup.classList.remove('show');
            }

            function openPopup() {
                popupContent.innerHTML = `
                    <div class="popup-question">Do you want a Portfolio, Survey, or Other website?</div>
                    <div class="popup-buttons">
                        <button class="popup-btn popup-btn-yes" id="popupYes">YES</button>
                        <button class="popup-btn popup-btn-no" id="popupNo">NO</button>
                    </div>
                `;
                document.getElementById('popupYes').addEventListener('click', function(e) {
                    e.stopPropagation();
                    window.open('https://mkbertrand.vercel.app/#contact', '_blank');
                    closePopup();
                });
                document.getElementById('popupNo').addEventListener('click', function(e) {
                    e.stopPropagation();
                    popupContent.innerHTML = `
                        <div class="popup-message">Text 0795 065 789 if you change your mind</div>
                    `;
                    setTimeout(closePopup, 3000);
                });
                popup.classList.add('show');
            }

            needBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (popup.classList.contains('show')) {
                    closePopup();
                } else {
                    openPopup();
                }
            });

            document.addEventListener('click', function(e) {
                if (!popup.contains(e.target) && !needBtn.contains(e.target)) {
                    closePopup();
                }
            });

            popup.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        })();
    </script>
</body>
</html>
