<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kabgayi · Registration Successful</title>
    <!-- Poppins font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #b8e1ff;
            color: #1e1e1e;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Moving blur background */
        .moving-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .blur-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: moveBlur 20s infinite alternate ease-in-out;
        }

        .orb1 {
            width: 600px;
            height: 600px;
            background: #b8e1ff;
            top: -250px;
            left: -150px;
            animation-duration: 27s;
        }

        .orb2 {
            width: 500px;
            height: 500px;
            background: #ffecb3;
            bottom: -200px;
            right: -100px;
            animation-duration: 24s;
            animation-delay: -5s;
        }

        .orb3 {
            width: 450px;
            height: 450px;
            background: #a0d0ff;
            top: 30%;
            right: 15%;
            animation-duration: 30s;
            animation-delay: -12s;
        }

        .orb4 {
            width: 400px;
            height: 400px;
            background: #ffe0a0;
            bottom: 10%;
            left: 20%;
            animation-duration: 22s;
            animation-delay: -8s;
        }

        .orb5 {
            width: 550px;
            height: 550px;
            background: #cce5ff;
            top: 50%;
            left: 40%;
            animation-duration: 28s;
            animation-delay: -3s;
        }

        @keyframes moveBlur {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(70px, -50px) scale(1.05); }
            66% { transform: translate(-50px, 60px) scale(0.98); }
            100% { transform: translate(40px, -30px) scale(1.02); }
        }

        /* White blur effects on corners */
        .white-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .white-blur::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at bottom, rgba(255,255,255,0.7) 0%, transparent 70%);
            filter: blur(30px);
        }

        .white-blur::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 30%;
            height: 30%;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.8) 0%, transparent 70%);
            filter: blur(40px);
        }

        .corner-blur {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 30%;
            height: 30%;
            background: radial-gradient(circle at bottom right, rgba(255,255,255,0.8) 0%, transparent 70%);
            filter: blur(50px);
            pointer-events: none;
            z-index: 1;
        }

        /* Main container */
        .success-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Success card - same glass style as registration */
        .success-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 3rem 2rem;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Checkmark icon */
        .checkmark {
            width: 80px;
            height: 80px;
            background: #2c7da0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: white;
            font-size: 2.5rem;
            box-shadow: 0 10px 20px rgba(44,125,160,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }
            80% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Titles */
        .success-title {
            font-size: 2rem;
            font-weight: 600;
            color: #1e1e1e;
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(255,255,255,0.3);
        }

        .success-message {
            font-size: 1rem;
            color: #2c3e50;
            margin-bottom: 2rem;
            line-height: 1.6;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }

        /* Home button */
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            background: #1e1e1e;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }

        .home-btn i {
            color: #ffd966;
        }

        .home-btn:hover {
            background: #2a2a2a;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        /* Left vertical button */
        .need-website-btn {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(44, 125, 160, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 1.5rem 0.4rem;
            border-radius: 0 12px 12px 0;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            z-index: 100;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            line-height: 1.4;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .need-website-btn:hover {
            background: #1e5f7a;
            padding: 1.8rem 0.5rem;
        }

        /* Popup box */
        .popup-box {
            position: fixed;
            left: 70px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 200;
            min-width: 260px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: none;
        }

        .popup-box.show {
            display: block;
        }

        .popup-content {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .popup-question {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e1e1e;
        }

        .popup-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
        }

        .popup-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: 'Poppins', sans-serif;
        }

        .popup-btn-yes {
            background: #2c7da0;
            color: white;
        }

        .popup-btn-yes:hover {
            background: #1e5f7a;
        }

        .popup-btn-no {
            background: #f0f0f0;
            color: #1e1e1e;
        }

        .popup-btn-no:hover {
            background: #e0e0e0;
        }

        .popup-message {
            font-size: 0.9rem;
            color: #2c7da0;
            text-align: center;
            padding: 0.5rem;
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 1rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            color: #2c3e50;
            z-index: 20;
            text-shadow: 0 1px 2px rgba(255,255,255,0.3);
        }

        /* Mobile */
        @media (max-width: 600px) {
            .success-card {
                padding: 2rem 1.5rem;
            }
            .popup-box {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 80px;
                transform: none;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Moving blur background -->
    <div class="moving-blur">
        <div class="blur-orb orb1"></div>
        <div class="blur-orb orb2"></div>
        <div class="blur-orb orb3"></div>
        <div class="blur-orb orb4"></div>
        <div class="blur-orb orb5"></div>
    </div>

    <!-- White blur effects -->
    <div class="white-blur"></div>
    <div class="corner-blur"></div>

    <!-- Background music (hidden, plays on first interaction) -->
    <audio id="bgMusic" loop preload="auto">
        <source src="music/back.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Fixed left vertical button -->
    <div class="need-website-btn" id="needWebsiteBtn">
        NEED A<br>WEBSITE?
    </div>

    <!-- Popup box -->
    <div class="popup-box" id="popupBox">
        <div class="popup-content" id="popupContent">
            <div class="popup-question">Do you want a Portfolio, Survey, or Other website?</div>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-yes" id="popupYes">YES</button>
                <button class="popup-btn popup-btn-no" id="popupNo">NO</button>
            </div>
        </div>
    </div>

    <!-- Main success content -->
    <div class="success-container">
        <div class="success-card">
            <div class="checkmark">
                <i class="fas fa-check"></i>
            </div>
            <h1 class="success-title">Thank You!</h1>
            <p class="success-message">
                Your registration has been successfully submitted.<br>
                We will contact you soon via WhatsApp.
            </p>
            <a href="index.html" class="home-btn">
                <i class="fas fa-home"></i> Return to Home
            </a>
        </div>
    </div>

    <div class="footer">
        Diocese Kabgayi · Académie de Musique Sacrée · Children's Music School
    </div>

    <script>
        (function() {
            // ===== BACKGROUND MUSIC =====
            const audio = document.getElementById('bgMusic');
            let musicPlayed = false;

            function playMusic() {
                if (!musicPlayed) {
                    audio.play().catch(e => console.log('Autoplay prevented:', e));
                    musicPlayed = true;
                }
            }

            document.addEventListener('click', playMusic, { once: true });
            document.addEventListener('touchstart', playMusic, { once: true });

            // ===== NEED WEBSITE POPUP LOGIC =====
            const needBtn = document.getElementById('needWebsiteBtn');
            const popup = document.getElementById('popupBox');
            const popupContent = document.getElementById('popupContent');

            function closePopup() {
                popup.classList.remove('show');
            }

            function openPopup() {
                popupContent.innerHTML = `
                    <div class="popup-question">Do you want a Portfolio, Survey, or Other website?</div>
                    <div class="popup-buttons">
                        <button class="popup-btn popup-btn-yes" id="popupYes">YES</button>
                        <button class="popup-btn popup-btn-no" id="popupNo">NO</button>
                    </div>
                `;
                document.getElementById('popupYes').addEventListener('click', function(e) {
                    e.stopPropagation();
                    window.open('https://mkbertrand.vercel.app/#contact', '_blank');
                    closePopup();
                });
                document.getElementById('popupNo').addEventListener('click', function(e) {
                    e.stopPropagation();
                    popupContent.innerHTML = `
                        <div class="popup-message">Text 0795 065 789 if you change your mind</div>
                    `;
                    setTimeout(closePopup, 3000);
                });
                popup.classList.add('show');
            }

            needBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (popup.classList.contains('show')) {
                    closePopup();
                } else {
                    openPopup();
                }
            });

            document.addEventListener('click', function(e) {
                if (!popup.contains(e.target) && !needBtn.contains(e.target)) {
                    closePopup();
                }
            });

            popup.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        })();
    </script>
</body>
</html>
