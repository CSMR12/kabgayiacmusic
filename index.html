<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>kabgayiacmusic.vercel.app · Redeploying</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05050b;
            font-family: 'Inter', system-ui, -apple-system, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* main container - clean, modern, vercel-like */
        .deploy-container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            background: #0a0a10;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.02);
            overflow: hidden;
            backdrop-filter: blur(1px);
        }

        /* header */
        .header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(2, 2, 8, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .vercel-icon {
            background: #ffffff;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            font-family: monospace;
            color: #000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .brand-name {
            font-weight: 620;
            font-size: 1.35rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f0ff, #bcbcff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .badge {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            padding: 0.3rem 1rem;
            font-size: 0.7rem;
            font-weight: 500;
            font-family: 'SF Mono', monospace;
            color: #9ca3c0;
            border: 0.5px solid rgba(255,255,255,0.06);
        }

        /* main content */
        .main-content {
            padding: 2.5rem 2rem 2.8rem 2rem;
            text-align: center;
        }

        /* site url section */
        .site-section {
            margin-bottom: 2.5rem;
        }

        .site-url {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #c0c0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            word-break: break-all;
            margin-bottom: 0.5rem;
        }

        .action-text {
            font-size: 0.75rem;
            color: #6f76a0;
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .dot-pulse {
            width: 6px;
            height: 6px;
            background: #3b82f6;
            border-radius: 50%;
            display: inline-block;
            animation: softPulse 1.4s infinite;
        }

        @keyframes softPulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* loading bar container - moving small bars like a single flowing line */
        .loading-bars-container {
            width: 100%;
            margin: 2rem 0 1.8rem 0;
            position: relative;
            height: 48px;
            overflow: hidden;
        }

        .bars-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* each small bar */
        .moving-bar {
            flex-shrink: 0;
            width: 6px;
            height: 28px;
            background: linear-gradient(180deg, #3b82f6, #a855f7);
            border-radius: 4px;
            opacity: 0.6;
            animation: barFlow linear infinite;
        }

        /* infinite movement from right to left, creating a perpetual wave */
        @keyframes barFlow {
            0% {
                transform: translateX(0);
                opacity: 0.4;
            }
            50% {
                opacity: 1;
                transform: scaleY(1.2);
            }
            100% {
                transform: translateX(calc(-100% - 4px));
                opacity: 0.4;
            }
        }

        /* second variation: gives smooth ripple effect */
        .ripple-bars {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: flex-start;
            flex-wrap: nowrap;
            overflow-x: hidden;
        }

        .bar-unit {
            width: 7px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #c084fc);
            border-radius: 3px;
            flex-shrink: 0;
            animation: flowForever 1.8s linear infinite;
        }

        /* staggered animation for each bar using nth-child, creates moving line illusion */
        .bar-unit:nth-child(1) { animation-delay: 0s; animation-duration: 1.6s; }
        .bar-unit:nth-child(2) { animation-delay: 0.1s; animation-duration: 1.7s; }
        .bar-unit:nth-child(3) { animation-delay: 0.2s; animation-duration: 1.5s; }
        .bar-unit:nth-child(4) { animation-delay: 0.3s; animation-duration: 1.8s; }
        .bar-unit:nth-child(5) { animation-delay: 0.4s; animation-duration: 1.6s; }
        .bar-unit:nth-child(6) { animation-delay: 0.5s; animation-duration: 1.7s; }
        .bar-unit:nth-child(7) { animation-delay: 0.6s; animation-duration: 1.5s; }
        .bar-unit:nth-child(8) { animation-delay: 0.7s; animation-duration: 1.9s; }
        .bar-unit:nth-child(9) { animation-delay: 0.8s; animation-duration: 1.6s; }
        .bar-unit:nth-child(10) { animation-delay: 0.9s; animation-duration: 1.7s; }
        .bar-unit:nth-child(11) { animation-delay: 1s; animation-duration: 1.8s; }
        .bar-unit:nth-child(12) { animation-delay: 1.1s; animation-duration: 1.5s; }
        .bar-unit:nth-child(13) { animation-delay: 1.2s; animation-duration: 1.6s; }
        .bar-unit:nth-child(14) { animation-delay: 1.3s; animation-duration: 1.7s; }
        .bar-unit:nth-child(15) { animation-delay: 1.4s; animation-duration: 1.9s; }
        .bar-unit:nth-child(16) { animation-delay: 1.5s; animation-duration: 1.6s; }
        .bar-unit:nth-child(17) { animation-delay: 1.6s; animation-duration: 1.5s; }
        .bar-unit:nth-child(18) { animation-delay: 1.7s; animation-duration: 1.8s; }
        .bar-unit:nth-child(19) { animation-delay: 1.8s; animation-duration: 1.7s; }
        .bar-unit:nth-child(20) { animation-delay: 1.9s; animation-duration: 1.6s; }

        @keyframes flowForever {
            0% {
                transform: translateX(0) scaleY(0.8);
                opacity: 0.5;
                background: linear-gradient(180deg, #3b82f6, #60a5fa);
            }
            25% {
                transform: translateX(2px) scaleY(1.2);
                opacity: 1;
                background: linear-gradient(180deg, #a855f7, #c084fc);
            }
            50% {
                transform: translateX(4px) scaleY(1);
                opacity: 0.9;
                background: linear-gradient(180deg, #3b82f6, #a855f7);
            }
            75% {
                transform: translateX(2px) scaleY(1.1);
                opacity: 0.8;
            }
            100% {
                transform: translateX(0) scaleY(0.8);
                opacity: 0.5;
            }
        }

        /* infinite sliding container effect - moving bars as a single wave line */
        .sliding-track {
            width: 100%;
            overflow: hidden;
            position: relative;
            height: 42px;
        }

        .bars-slider {
            display: flex;
            gap: 6px;
            position: absolute;
            left: 0;
            top: 0;
            animation: slideInfinity 2s linear infinite;
            white-space: nowrap;
        }

        .slider-bar {
            width: 8px;
            height: 32px;
            background: linear-gradient(180deg, #3b82f6, #c084fc);
            border-radius: 4px;
            flex-shrink: 0;
        }

        @keyframes slideInfinity {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        /* use a cleaner, smoother infinite bar flow (the final chosen one) */
        .infinite-loader {
            width: 100%;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            position: relative;
        }

        .flow-bar {
            width: 7px;
            height: 30px;
            background: linear-gradient(180deg, #3b82f6, #a855f7);
            border-radius: 20px;
            animation: waveMove 1.2s ease-in-out infinite;
            opacity: 0.7;
        }

        /* staggered animation - creates moving line effect */
        .flow-bar:nth-child(1) { animation-delay: 0s; animation-duration: 1.1s; }
        .flow-bar:nth-child(2) { animation-delay: 0.08s; animation-duration: 1.2s; }
        .flow-bar:nth-child(3) { animation-delay: 0.16s; animation-duration: 1.0s; }
        .flow-bar:nth-child(4) { animation-delay: 0.24s; animation-duration: 1.3s; }
        .flow-bar:nth-child(5) { animation-delay: 0.32s; animation-duration: 1.15s; }
        .flow-bar:nth-child(6) { animation-delay: 0.40s; animation-duration: 1.25s; }
        .flow-bar:nth-child(7) { animation-delay: 0.48s; animation-duration: 1.05s; }
        .flow-bar:nth-child(8) { animation-delay: 0.56s; animation-duration: 1.35s; }
        .flow-bar:nth-child(9) { animation-delay: 0.64s; animation-duration: 1.18s; }
        .flow-bar:nth-child(10) { animation-delay: 0.72s; animation-duration: 1.22s; }
        .flow-bar:nth-child(11) { animation-delay: 0.80s; animation-duration: 1.08s; }
        .flow-bar:nth-child(12) { animation-delay: 0.88s; animation-duration: 1.28s; }
        .flow-bar:nth-child(13) { animation-delay: 0.96s; animation-duration: 1.12s; }
        .flow-bar:nth-child(14) { animation-delay: 1.04s; animation-duration: 1.32s; }
        .flow-bar:nth-child(15) { animation-delay: 1.12s; animation-duration: 1.18s; }
        .flow-bar:nth-child(16) { animation-delay: 1.20s; animation-duration: 1.24s; }
        .flow-bar:nth-child(17) { animation-delay: 1.28s; animation-duration: 1.06s; }
        .flow-bar:nth-child(18) { animation-delay: 1.36s; animation-duration: 1.38s; }
        .flow-bar:nth-child(19) { animation-delay: 1.44s; animation-duration: 1.14s; }
        .flow-bar:nth-child(20) { animation-delay: 1.52s; animation-duration: 1.20s; }

        @keyframes waveMove {
            0% {
                transform: scaleY(0.6);
                opacity: 0.5;
                background: linear-gradient(180deg, #3b82f6, #60a5fa);
            }
            50% {
                transform: scaleY(1.3);
                opacity: 1;
                background: linear-gradient(180deg, #a855f7, #c084fc);
            }
            100% {
                transform: scaleY(0.6);
                opacity: 0.5;
                background: linear-gradient(180deg, #3b82f6, #60a5fa);
            }
        }

        /* status message */
        .status-area {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .status-text {
            font-size: 0.8rem;
            color: #a0a6c5;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        .spinner-dot {
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            animation: blinkDot 1.4s infinite;
        }

        @keyframes blinkDot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        .footer-note {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.65rem;
            color: #3f4568;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 1.5rem;
        }

        /* responsive */
        @media (max-width: 550px) {
            .main-content {
                padding: 1.8rem 1.5rem 2rem 1.5rem;
            }
            .site-url {
                font-size: 1.2rem;
            }
            .flow-bar {
                width: 5px;
                height: 26px;
            }
            .infinite-loader {
                gap: 4px;
            }
            .header {
                padding: 1rem 1.5rem;
            }
        }

        @media (max-width: 450px) {
            .flow-bar {
                width: 4.5px;
                height: 24px;
            }
            .infinite-loader {
                gap: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="deploy-container">
        <div class="header">
            <div class="brand">
                <div class="vercel-icon">▲</div>
                <span class="brand-name">Vercel</span>
            </div>
            <div class="badge">Edge Network · Deploying</div>
        </div>

        <div class="main-content">
            <div class="site-section">
                <div class="site-url">kabgayiacmusic.vercel.app</div>
                <div class="action-text">
                    <span class="dot-pulse"></span>
                    <span>Website under Deployment</span>
                </div>
            </div>

            <!-- Infinite moving bars - creates a single line flow forever -->
            <div class="infinite-loader">
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
                <div class="flow-bar"></div>
            </div>

            <div class="status-area">
                <div class="spinner-dot"></div>
                <div class="status-text">Wait for a while. It may take time...</div>
            </div>

            <div class="footer-note">
                ▲ Vercel · Static + Edge Functions · Re-upload initiated
            </div>
        </div>
    </div>
</body>
</html>
