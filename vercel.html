<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vercel · Kabgayi Music Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="codes.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            color: #e5e5e5;
            overflow-x: hidden;
        }

        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #111111;
            border-right: 1px solid #222222;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            padding: 2rem 1rem;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
        }

        .sidebar-logo span {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.3px;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav-item {
            padding: 0.75rem 1rem;
            margin: 0.25rem 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #888888;
        }

        .sidebar-nav-item:hover {
            background: #1a1a1a;
            color: #ffffff;
        }

        .sidebar-nav-item.active {
            background: #1a1a1a;
            color: #ffffff;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2rem 3rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #222222;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #1a1a1a;
            border-radius: 100px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .status-dot.active {
            background: #ff4444;
        }

        .status-dot.inactive {
            background: #00ff00;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 12px;
            padding: 1rem;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .config-btn {
            background: #0a0a0a;
            border: 1px solid #222222;
            border-radius: 8px;
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 0.8rem;
        }

        .config-btn:hover {
            border-color: #444;
        }

        .config-btn.enabled {
            background: #0070f3;
            border-color: #0070f3;
            color: white;
        }

        .terminal {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'Monaco', monospace;
            font-size: 0.8rem;
            margin-top: 1rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .terminal-line {
            color: #00ff00;
            margin-bottom: 0.5rem;
        }

        .terminal-error {
            color: #ff4444;
        }

        .code-editor {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .code-editor textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Monaco', monospace;
            font-size: 0.8rem;
            resize: vertical;
            outline: none;
        }

        .preview-frame {
            width: 100%;
            height: 500px;
            border: 1px solid #222222;
            border-radius: 8px;
            background: white;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th,
        .history-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #222222;
        }

        .history-table th {
            color: #888;
            font-weight: 500;
            font-size: 0.8rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: #0070f3;
            color: white;
        }

        .btn-primary:hover {
            background: #0060df;
        }

        .btn-primary:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .plan-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .plan-easy { background: #00ff0022; color: #00ff00; border: 1px solid #00ff00; }
        .plan-medium { background: #ffaa0022; color: #ffaa00; border: 1px solid #ffaa00; }
        .plan-hard { background: #ff444422; color: #ff4444; border: 1px solid #ff4444; }
        .plan-extreme { background: #ff00ff22; color: #ff00ff; border: 1px solid #ff00ff; }

        @media (max-width: 1024px) {
            .sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 20H22L12 2Z" fill="white"/>
                </svg>
                <span>Vercel</span>
            </div>
            <ul class="sidebar-nav">
                <li class="sidebar-nav-item active" data-tab="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </li>
                <li class="sidebar-nav-item" data-tab="deployments">
                    <i class="fas fa-code-branch"></i>
                    <span>Deployments</span>
                </li>
                <li class="sidebar-nav-item" data-tab="analytics">
                    <i class="fas fa-chart-line"></i>
                    <span>Analytics</span>
                </li>
                <li class="sidebar-nav-item" data-tab="configs">
                    <i class="fas fa-cog"></i>
                    <span>Configs</span>
                </li>
                <li class="sidebar-nav-item" data-tab="logs">
                    <i class="fas fa-terminal"></i>
                    <span>Logs</span>
                </li>
            </ul>
        </div>

        <div class="main-content">
            <div class="header">
                <h1 id="pageTitle">Dashboard</h1>
                <div class="status-badge" id="statusBadge">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Checking...</span>
                </div>
            </div>

            <div id="tabContent"></div>
        </div>
    </div>

    <script>
        (function() {
            // Supabase Configuration
            const SUPABASE_URL = 'https://amnkoumnvwyjzqcwxord.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtbmtvdW1udnd5anpxY3d4b3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNTI4ODUsImV4cCI6MjA4NzgyODg4NX0.oyY0OobB7ksAz-ectgkKgJC68DacWfK9w1CftJrEUps';
            
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Global state
            let maintenanceStatus = false;
            let maintenanceStartTime = null;
            let detectedPlan = null; // Will be detected from code
            let enabledButtons = [];
            let history = [];

            // ALL BUTTONS - 27 total (shown all at once in CONFIGS)
            const ALL_BUTTONS = [
                'GitHub Actions', 'Vercel Functions', 'Environment Variables', 'Build Settings', 'Preview Deployments',
                'Edge Functions', 'Middleware', 'Image Optimization', 'Analytics', 'Log Drains', 
                'Web Analytics', 'Speed Insights', 'Serverless Functions', 'ISR', 'SSR', 
                'Dependabot', 'Secret Scanning', 'CodeQL', 'Advanced Security', 'Compliance Checks', 
                'Audit Logs', 'SSO', 'Quantum Encryption', 'Zero-Trust Architecture', 'Blockchain Verification', 
                'AI Threat Detection', 'Disaster Recovery', 'Multi-Region Failover'
            ];

            // Required button counts per plan
            const REQUIRED_COUNTS = {
                easy: 5,
                medium: 15,
                hard: 22,
                extreme: 27
            };

            // Load maintenance status from Supabase
            async function loadMaintenanceStatus() {
                try {
                    const { data, error } = await supabaseClient
                        .from('maintenance_settings')
                        .select('*')
                        .eq('id', 1)
                        .single();

                    if (error) throw error;

                    maintenanceStatus = data.is_active;
                    if (maintenanceStatus && !maintenanceStartTime) {
                        maintenanceStartTime = new Date(data.updated_at || new Date());
                    }

                    updateStatusDisplay();
                    return maintenanceStatus;
                } catch (err) {
                    console.error('Error loading status:', err);
                    return false;
                }
            }

            // Update status badge
            function updateStatusDisplay() {
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                if (maintenanceStatus) {
                    dot.className = 'status-dot active';
                    text.textContent = 'Maintenance Mode: ACTIVE';
                } else {
                    dot.className = 'status-dot inactive';
                    text.textContent = 'System Online';
                }
            }

            // Load history from localStorage
            function loadHistory() {
                const stored = localStorage.getItem('maintenance_history');
                if (stored) {
                    history = JSON.parse(stored);
                } else {
                    history = [];
                }
            }

            // Save to history
            async function saveToHistory(action, details) {
                const entry = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    action: action,
                    details: details,
                    plan: detectedPlan
                };
                history.unshift(entry);
                localStorage.setItem('maintenance_history', JSON.stringify(history));
            }

            // Disable maintenance mode
            async function disableMaintenance() {
                try {
                    const { error } = await supabaseClient
                        .from('maintenance_settings')
                        .update({ 
                            is_active: false, 
                            updated_at: new Date().toISOString() 
                        })
                        .eq('id', 1);

                    if (error) throw error;
                    
                    maintenanceStatus = false;
                    updateStatusDisplay();
                    await saveToHistory('MAINTENANCE_DISABLED', `Disabled using ${detectedPlan?.toUpperCase() || 'UNKNOWN'} plan`);
                    return true;
                } catch (err) {
                    console.error('Error disabling maintenance:', err);
                    return false;
                }
            }

            // Get maintenance duration
            function getMaintenanceDuration() {
                if (!maintenanceStartTime) return 'Not in maintenance';
                const now = new Date();
                const diff = Math.floor((now - maintenanceStartTime) / 1000 / 60);
                if (diff < 60) return `${diff} minutes`;
                if (diff < 1440) return `${Math.floor(diff / 60)} hours`;
                return `${Math.floor(diff / 1440)} days`;
            }

            // Detect plan from code
            function detectPlanFromCode(code) {
                if (!code) return null;
                
                // Check which code matches
                if (window.RECOVERY_CODES) {
                    if (code.trim() === window.RECOVERY_CODES.easy.trim()) return 'easy';
                    if (code.trim() === window.RECOVERY_CODES.medium.trim()) return 'medium';
                    if (code.trim() === window.RECOVERY_CODES.hard.trim()) return 'hard';
                    if (code.trim() === window.RECOVERY_CODES.extreme.trim()) return 'extreme';
                }
                
                // Also check by content patterns
                if (code.includes('KMA_EASY')) return 'easy';
                if (code.includes('KMA_MEDIUM')) return 'medium';
                if (code.includes('KMA_HARD')) return 'hard';
                if (code.includes('KMA-EXTREME')) return 'extreme';
                
                return null;
            }

            // Toggle config button
            window.toggleConfigButton = function(btnName) {
                const index = enabledButtons.indexOf(btnName);
                if (index === -1) {
                    enabledButtons.push(btnName);
                } else {
                    enabledButtons.splice(index, 1);
                }
                
                const btns = document.querySelectorAll('.config-btn');
                btns.forEach(btn => {
                    if (btn.getAttribute('data-btn') === btnName) {
                        if (enabledButtons.includes(btnName)) {
                            btn.classList.add('enabled');
                            btn.innerHTML = `<i class="fas fa-check-circle"></i> ${btnName}`;
                        } else {
                            btn.classList.remove('enabled');
                            btn.innerHTML = `<i class="fas fa-circle"></i> ${btnName}`;
                        }
                    }
                });
                
                // Update recovery button state based on detected plan
                if (detectedPlan && REQUIRED_COUNTS[detectedPlan]) {
                    const recoveryBtn = document.getElementById('executeRecovery');
                    if (recoveryBtn) {
                        recoveryBtn.disabled = enabledButtons.length < REQUIRED_COUNTS[detectedPlan];
                    }
                }
            };

            // Dashboard Tab
            function renderDashboard() {
                const planDisplay = detectedPlan ? 
                    `<span class="plan-badge plan-${detectedPlan}">${detectedPlan.toUpperCase()}</span>` : 
                    '<span style="color: #888;">No plan detected</span>';
                
                return `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">System Status</div>
                            <div class="stat-value" style="color: ${maintenanceStatus ? '#ff4444' : '#00ff00'}">
                                ${maintenanceStatus ? 'MAINTENANCE' : 'OPERATIONAL'}
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Maintenance Duration</div>
                            <div class="stat-value">${maintenanceStatus ? getMaintenanceDuration() : 'N/A'}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Active Recovery Plan</div>
                            <div class="stat-value" style="font-size: 1rem;">${planDisplay}</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-chart-line"></i>
                            System Health Metrics
                        </div>
                        <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr);">
                            <div class="stat-card">
                                <div class="stat-label">Uptime (30d)</div>
                                <div class="stat-value">${maintenanceStatus ? '94.2%' : '99.9%'}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Response Time</div>
                                <div class="stat-value">${maintenanceStatus ? '2.3s' : '0.4s'}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Active Sessions</div>
                                <div class="stat-value">${maintenanceStatus ? '0' : '47'}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Error Rate</div>
                                <div class="stat-value">${maintenanceStatus ? '18.5%' : '0.02%'}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-clock"></i>
                            Recent Activity
                        </div>
                        ${history.slice(0, 5).map(h => `
                            <div style="padding: 0.5rem 0; border-bottom: 1px solid #222;">
                                <small style="color: #888;">${new Date(h.timestamp).toLocaleString()}</small>
                                <div>${h.action} - ${h.details}</div>
                            </div>
                        `).join('') || '<div>No recent activity</div>'}
                    </div>
                `;
            }

            // Deployments Tab
            function renderDeployments() {
                return `
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-history"></i>
                            Maintenance History
                        </div>
                        <table class="history-table">
                            <thead>
                                <tr><th>Timestamp</th><th>Action</th><th>Details</th><th>Plan</th>\\
                            </thead>
                            <tbody>
                                ${history.map(h => `
                                    <tr>
                                        <td>${new Date(h.timestamp).toLocaleString()}</td>
                                        <td>${h.action}</td>
                                        <td>${h.details}</td>
                                        <td>${h.plan ? h.plan.toUpperCase() : '-'}</td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4">No history available</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            // Analytics Tab
            function renderAnalytics() {
                return `
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-eye"></i>
                            Live Site Preview
                        </div>
                        ${maintenanceStatus ? `
                            <div style="background: #0a0a0a; border-radius: 8px; padding: 1rem; margin-bottom: 1rem;">
                                <div style="color: #ff4444; margin-bottom: 0.5rem;">
                                    <i class="fas fa-exclamation-triangle"></i> Site is in maintenance mode
                                </div>
                                <div style="color: #888; font-size: 0.85rem;">
                                    Current parameters affecting site availability:
                                    <ul style="margin-top: 0.5rem; margin-left: 1.5rem;">
                                        <li>Deployment state: PAUSED</li>
                                        <li>Edge network: RESTRICTED</li>
                                        <li>SSL certificate: VALID</li>
                                        <li>Database connection: LIMITED</li>
                                        <li>API rate limits: ENFORCED</li>
                                        <li>CDN cache: STALE</li>
                                    </ul>
                                </div>
                            </div>
                            <div style="background: #0a0a0a; border-radius: 8px; padding: 1rem; text-align: center; color: #888;">
                                <i class="fas fa-lock" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                                <div>Site preview unavailable during maintenance</div>
                                <div style="font-size: 0.75rem; margin-top: 0.5rem;">Enable recovery in Logs tab to restore access</div>
                            </div>
                        ` : `
                            <iframe src="https://kabgayiacmusic.vercel.app" class="preview-frame" title="Site Preview"></iframe>
                            <div style="margin-top: 1rem; padding: 1rem; background: #0a0a0a; border-radius: 8px;">
                                <div style="color: #00ff00; margin-bottom: 0.5rem;">✓ Everything is operational</div>
                                <div style="color: #888; font-size: 0.85rem;">All systems normal. No anomalies detected.</div>
                            </div>
                        `}
                    </div>
                `;
            }

            // Configs Tab - ALL buttons shown
            function renderConfigs() {
                const requiredForCurrentPlan = detectedPlan ? REQUIRED_COUNTS[detectedPlan] : 0;
                
                return `
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-cog"></i>
                            System Configuration (${ALL_BUTTONS.length} Services)
                        </div>
                        <div style="margin-bottom: 1rem; padding: 1rem; background: #0a0a0a; border-radius: 8px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                                <div>
                                    <strong>Current Plan:</strong> 
                                    ${detectedPlan ? 
                                        `<span class="plan-badge plan-${detectedPlan}">${detectedPlan.toUpperCase()}</span>` : 
                                        '<span style="color: #ff4444;">No plan detected - Enter code in Logs tab</span>'
                                    }
                                    ${detectedPlan ? `
                                        <div style="font-size: 0.75rem; color: #888; margin-top: 0.25rem;">
                                            Required configurations for ${detectedPlan.toUpperCase()}: ${requiredForCurrentPlan}/${REQUIRED_COUNTS[detectedPlan]}
                                        </div>
                                    ` : ''}
                                </div>
                                <div class="status-badge" style="background: ${detectedPlan && enabledButtons.length >= requiredForCurrentPlan ? '#00ff0022' : '#ff444422'}">
                                    <i class="fas ${detectedPlan && enabledButtons.length >= requiredForCurrentPlan ? 'fa-check-circle' : 'fa-lock'}"></i>
                                    ${detectedPlan && enabledButtons.length >= requiredForCurrentPlan ? 'READY' : `${requiredForCurrentPlan - enabledButtons.length} remaining`}
                                </div>
                            </div>
                        </div>
                        
                        <div class="buttons-grid">
                            ${ALL_BUTTONS.map(btn => `
                                <div class="config-btn ${enabledButtons.includes(btn) ? 'enabled' : ''}" 
                                     data-btn="${btn}"
                                     onclick="toggleConfigButton('${btn}')">
                                    <i class="fas ${enabledButtons.includes(btn) ? 'fa-check-circle' : 'fa-circle'}"></i>
                                    ${btn}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Logs Tab
            function renderLogs() {
                const requiredCount = detectedPlan ? REQUIRED_COUNTS[detectedPlan] : 0;
                const isReady = detectedPlan && enabledButtons.length >= requiredCount;
                
                return `
                    <div class="card">
                        <div class="card-title">
                            <i class="fas fa-terminal"></i>
                            Recovery Console
                        </div>
                        <div style="margin-bottom: 1rem; padding: 1rem; background: #0a0a0a; border-radius: 8px;">
                            <div style="color: #888; margin-bottom: 0.5rem;">
                                <i class="fas fa-info-circle"></i> Enter the recovery code for your plan
                            </div>
                            <div style="color: #888; font-size: 0.8rem;">
                                ${detectedPlan ? 
                                    `Detected Plan: <span class="plan-badge plan-${detectedPlan}">${detectedPlan.toUpperCase()}</span> | Configurations: ${enabledButtons.length}/${requiredCount}` : 
                                    'No plan detected. Enter a valid recovery code to determine your plan.'
                                }
                            </div>
                        </div>
                        
                        <div class="code-editor">
                            <textarea id="codeInput" rows="12" placeholder="Enter recovery code..."></textarea>
                        </div>
                        
                        <button class="btn btn-primary" id="detectPlanBtn" style="margin-bottom: 1rem; background: #444;">
                            <i class="fas fa-search"></i> Detect Plan from Code
                        </button>
                        
                        <button class="btn btn-primary" id="executeRecovery" ${!isReady ? 'disabled' : ''}>
                            <i class="fas fa-play"></i> Execute Recovery Protocol
                        </button>
                        
                        <div class="terminal" id="terminalOutput">
                            <div class="terminal-line">> System ready. Enter code and click "Detect Plan" to identify your recovery level.</div>
                        </div>
                    </div>
                `;
            }

            // Execute recovery
            function attachLogsEvents() {
                const detectBtn = document.getElementById('detectPlanBtn');
                const executeBtn = document.getElementById('executeRecovery');
                const terminal = document.getElementById('terminalOutput');
                const codeInput = document.getElementById('codeInput');
                
                if (detectBtn) {
                    detectBtn.onclick = () => {
                        const code = codeInput.value;
                        const plan = detectPlanFromCode(code);
                        
                        if (plan) {
                            detectedPlan = plan;
                            terminal.innerHTML = `<div class="terminal-line" style="color: #00ff00;">✓ Plan detected: ${plan.toUpperCase()}</div>`;
                            terminal.innerHTML += `<div class="terminal-line">> Required configurations: ${REQUIRED_COUNTS[plan]}/${REQUIRED_COUNTS[plan]}</div>`;
                            terminal.innerHTML += `<div class="terminal-line">> Go to Configs tab and enable the required services</div>`;
                            
                            // Update recovery button state
                            const isReady = enabledButtons.length >= REQUIRED_COUNTS[plan];
                            if (executeBtn) {
                                executeBtn.disabled = !isReady;
                            }
                            
                            // Re-render configs to show updated plan
                            const activeTab = document.querySelector('.sidebar-nav-item.active').getAttribute('data-tab');
                            if (activeTab === 'configs') {
                                document.getElementById('tabContent').innerHTML = renderConfigs();
                            } else if (activeTab === 'dashboard') {
                                document.getElementById('tabContent').innerHTML = renderDashboard();
                            }
                        } else {
                            terminal.innerHTML = `<div class="terminal-line terminal-error">✗ No valid plan detected</div>`;
                            terminal.innerHTML += `<div class="terminal-line">> Please enter a valid recovery code from the available plans</div>`;
                            detectedPlan = null;
                            if (executeBtn) executeBtn.disabled = true;
                        }
                    };
                }
                
                if (executeBtn) {
                    executeBtn.onclick = async () => {
                        const code = codeInput.value;
                        const plan = detectPlanFromCode(code);
                        const requiredCount = REQUIRED_COUNTS[plan];
                        
                        terminal.innerHTML = '<div class="terminal-line">> Executing recovery protocol...</div>';
                        await new Promise(resolve => setTimeout(resolve, 1500));
                        
                        if (plan && plan === detectedPlan) {
                            terminal.innerHTML += '<div class="terminal-line">> Code verification passed</div>';
                            terminal.innerHTML += '<div class="terminal-line">> Checking system configurations...</div>';
                            await new Promise(resolve => setTimeout(resolve, 1000));
                            
                            if (enabledButtons.length >= requiredCount) {
                                terminal.innerHTML += '<div class="terminal-line">✓ All configurations verified</div>';
                                terminal.innerHTML += '<div class="terminal-line">> Initiating recovery sequence...</div>';
                                await new Promise(resolve => setTimeout(resolve, 1500));
                                terminal.innerHTML += '<div class="terminal-line" style="color: #00ff00;">✓ RECOVERY SUCCESSFUL!</div>';
                                terminal.innerHTML += '<div class="terminal-line" style="color: #00ff00;">> Maintenance mode disabled</div>';
                                await disableMaintenance();
                            } else {
                                const missing = requiredCount - enabledButtons.length;
                                terminal.innerHTML += `<div class="terminal-line terminal-error">✗ Configuration error: ${missing} required services not initialized</div>`;
                                terminal.innerHTML += `<div class="terminal-line">> System integrity check failed</div>`;
                                terminal.innerHTML += `<div class="terminal-line">> Please enable all required configurations in Configs tab</div>`;
                            }
                        } else if (!plan) {
                            terminal.innerHTML += '<div class="terminal-line terminal-error">✗ Invalid recovery code</div>';
                            terminal.innerHTML += '<div class="terminal-line">> Please enter a valid recovery code and detect plan first</div>';
                        } else if (plan !== detectedPlan) {
                            terminal.innerHTML += '<div class="terminal-line terminal-error">✗ Plan mismatch</div>';
                            terminal.innerHTML += `<div class="terminal-line">> Detected ${plan.toUpperCase()} from code but current plan is ${detectedPlan.toUpperCase()}</div>`;
                            terminal.innerHTML += '<div class="terminal-line">> Please detect plan again before executing</div>';
                        }
                    };
                }
            }

            // Render current tab
            function renderCurrentTab() {
                const activeTabElement = document.querySelector('.sidebar-nav-item.active');
                if (!activeTabElement) return;
                
                const activeTab = activeTabElement.getAttribute('data-tab');
                const title = document.getElementById('pageTitle');
                const tabContent = document.getElementById('tabContent');
                
                switch(activeTab) {
                    case 'dashboard':
                        title.textContent = 'Dashboard';
                        tabContent.innerHTML = renderDashboard();
                        break;
                    case 'deployments':
                        title.textContent = 'Deployments';
                        tabContent.innerHTML = renderDeployments();
                        break;
                    case 'analytics':
                        title.textContent = 'Analytics';
                        tabContent.innerHTML = renderAnalytics();
                        break;
                    case 'configs':
                        title.textContent = 'Configurations';
                        tabContent.innerHTML = renderConfigs();
                        break;
                    case 'logs':
                        title.textContent = 'Recovery Logs';
                        tabContent.innerHTML = renderLogs();
                        attachLogsEvents();
                        break;
                }
            }

            // Tab switching
            document.querySelectorAll('.sidebar-nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    document.querySelectorAll('.sidebar-nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    renderCurrentTab();
                });
            });

            // Initialize
            async function init() {
                await loadMaintenanceStatus();
                loadHistory();
                renderCurrentTab();
                
                if (maintenanceStatus) {
                    const { data } = await supabaseClient
                        .from('maintenance_settings')
                        .select('updated_at')
                        .eq('id', 1)
                        .single();
                    if (data && data.updated_at) {
                        maintenanceStartTime = new Date(data.updated_at);
                    }
                }
            }
            
            init();
        })();
    </script>
</body>
</html>
